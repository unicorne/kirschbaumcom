<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimization — Recommender System</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090d;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'IBM Plex Mono', -apple-system, monospace;
  }
  .wrap { width: 94vw; max-width: 900px; }
  canvas { display: block; width: 100%; height: 380px; border-radius: 8px; background: #0d1117; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 2px; color: #484f58; font-size: 10px; letter-spacing: 0.1em;
  }
  .meta span { color: #bc8cff; }
  @media (max-width: 600px) { canvas { height: 280px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <div class="meta">
    <div>OPTIMIZATION <span>/ RECOMMENDER SYSTEM</span></div>
    <div>EXAMPLE 04</div>
  </div>
  <canvas id="c"></canvas>
</div>
<script>
(() => {
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)', blueDim: 'rgba(88,166,255,0.08)',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)',
    red: '#f85149', redGlow: 'rgba(248,81,73,0.4)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.3)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.3)',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });

  let mobile = window.innerWidth < 600;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    mobile = window.innerWidth < 600;
    const dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function S(w) { return Math.max(0.45, w / 600); }
  function shadow(c, b) { if (!mobile) { ctx.shadowColor = c; ctx.shadowBlur = b; } }
  function drawGlow(x, y, r, c) {
    if (mobile) r *= 0.6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function lerp(a, b, t) { return a + (b - a) * t; }

  /* ── Seeded random ── */
  let seed = 42;
  function srand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }
  function srandReset() { seed = 42; }

  /* ── Rating matrix data ── */
  const USERS = 6;
  const ITEMS = 8;
  const userNames = ['U1', 'U2', 'U3', 'U4', 'U5', 'U6'];
  const itemNames = ['I1','I2','I3','I4','I5','I6','I7','I8'];

  // Known ratings (sparse matrix) — some cells are empty (to be predicted)
  srandReset();
  const ratings = [];
  const known = [];   // boolean: is this cell a known rating?
  const predicted = []; // predicted values for unknown cells
  for (let u = 0; u < USERS; u++) {
    ratings[u] = [];
    known[u] = [];
    predicted[u] = [];
    for (let i = 0; i < ITEMS; i++) {
      const r = srand();
      if (r < 0.45) {
        // Known rating
        ratings[u][i] = Math.round(1 + srand() * 4); // 1-5
        known[u][i] = true;
      } else {
        ratings[u][i] = 0;
        known[u][i] = false;
      }
      predicted[u][i] = 0;
    }
  }

  // Generate predicted ratings for empty cells
  srandReset(); for (let i = 0; i < 50; i++) srand();
  for (let u = 0; u < USERS; u++) {
    for (let i = 0; i < ITEMS; i++) {
      if (!known[u][i]) {
        predicted[u][i] = Math.round((1.5 + srand() * 3.5) * 10) / 10; // 1.5-5.0
      }
    }
  }

  // Top recommendations per user (highest predicted unknown cells)
  const topRecs = [];
  for (let u = 0; u < USERS; u++) {
    const unknowns = [];
    for (let i = 0; i < ITEMS; i++) {
      if (!known[u][i]) unknowns.push({ item: i, score: predicted[u][i] });
    }
    unknowns.sort((a, b) => b.score - a.score);
    topRecs[u] = unknowns.slice(0, 2).map(x => x.item);
  }

  // Fill order for unknown cells (column by column for visual sweep)
  const fillOrder = [];
  for (let i = 0; i < ITEMS; i++) {
    for (let u = 0; u < USERS; u++) {
      if (!known[u][i]) fillOrder.push({ u, i });
    }
  }

  /* ── Timing (12s loop) ── */
  const CYCLE = 12;
  // 0-1.5: show known ratings
  // 1.5-6: fill in predictions one by one
  // 6-8: highlight top recommendations
  // 8-10.5: hold
  // 10.5-12: fade out

  function draw(ts) {
    if (!draw.start) draw.start = ts;
    const t = (ts - draw.start) / 1000;
    const s = S(W);
    const ct = t % CYCLE;
    ctx.clearRect(0, 0, W, H);

    const fadeIn = clamp(ct / 0.6, 0, 1);
    const fadeOut = ct > 10.5 ? 1 - clamp((ct - 10.5) / 1.5, 0, 1) : 1;
    const gAlpha = fadeIn * fadeOut;

    /* ── Grid background ── */
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5;
    ctx.globalAlpha = (mobile ? 0.12 : 0.2) * gAlpha;
    const gsp = 28 * s;
    for (let y = 0; y <= H; y += gsp) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    if (!mobile) {
      for (let x = 0; x <= W; x += gsp) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    /* ── Layout ── */
    const labelW = mobile ? 38 * s : 55 * s;
    const labelH = mobile ? 22 * s : 28 * s;
    const padL = 16 * s + labelW;
    const padR = 16 * s;
    const padT = 44 * s + labelH;
    const padB = 20 * s;
    const gridW = W - padL - padR;
    const gridH = H - padT - padB;
    const cellW = gridW / ITEMS;
    const cellH = gridH / USERS;

    /* ── Phase calcs ── */
    const knownReveal = clamp(ct / 1.5, 0, 1);
    const fillP = clamp((ct - 1.5) / 4.5, 0, 1);
    const filledCount = Math.floor(fillP * fillOrder.length);
    const highlightP = clamp((ct - 6) / 2, 0, 1);
    const highlightE = easeInOut(highlightP);

    /* ── Column labels (items) ── */
    ctx.textAlign = 'center';
    for (let i = 0; i < ITEMS; i++) {
      const cx = padL + i * cellW + cellW / 2;
      const cy = padT - 8 * s;
      ctx.font = `500 ${Math.max(6, (mobile ? 7 : 8) * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.purple;
      ctx.globalAlpha = gAlpha * 0.7;
      ctx.fillText(itemNames[i], cx, cy);
    }

    /* ── Row labels (users) ── */
    ctx.textAlign = 'right';
    for (let u = 0; u < USERS; u++) {
      const rx = padL - 8 * s;
      const ry = padT + u * cellH + cellH / 2 + 3 * s;
      ctx.font = `500 ${Math.max(7, 9 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.blue;
      ctx.globalAlpha = gAlpha * 0.7;
      ctx.fillText(userNames[u], rx, ry);
    }
    ctx.globalAlpha = 1;

    // Track which predicted cells are filled so far
    const filledSet = new Set();
    for (let fi = 0; fi < filledCount; fi++) {
      const { u, i } = fillOrder[fi];
      filledSet.add(u * ITEMS + i);
    }

    // Current filling cell (for highlight)
    const currentFill = filledCount < fillOrder.length ? fillOrder[filledCount] : null;

    /* ── Matrix cells ── */
    for (let u = 0; u < USERS; u++) {
      for (let i = 0; i < ITEMS; i++) {
        const cx = padL + i * cellW;
        const cy = padT + u * cellH;
        const inset = 1.5 * s;
        const cw = cellW - inset * 2;
        const ch = cellH - inset * 2;
        const isKnown = known[u][i];
        const isFilled = filledSet.has(u * ITEMS + i);
        const isCurrent = currentFill && currentFill.u === u && currentFill.i === i && fillP > 0 && fillP < 1;
        const isTopRec = highlightP > 0 && topRecs[u].includes(i) && !isKnown;

        // Cell background
        ctx.globalAlpha = gAlpha;
        if (isTopRec && isFilled) {
          const pulse = 0.15 + highlightE * 0.25 + Math.sin(t * 4 + u) * 0.05;
          ctx.fillStyle = _rgba(T.green, pulse);
          ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.fill();
          ctx.strokeStyle = T.green;
          ctx.lineWidth = 1.5 * s;
          ctx.globalAlpha = gAlpha * highlightE;
          shadow(T.greenGlow, 6 * s);
          ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.stroke();
          ctx.shadowBlur = 0;
        } else if (isCurrent) {
          const pulse = 0.5 + Math.sin(t * 10) * 0.3;
          ctx.fillStyle = _rgba(T.amber, 0.12 + pulse * 0.1);
          ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.fill();
          ctx.strokeStyle = T.amber;
          ctx.lineWidth = 1 * s;
          shadow(T.amberGlow, 5 * s);
          ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.stroke();
          ctx.shadowBlur = 0;
        } else if (isKnown) {
          const norm = (ratings[u][i] - 1) / 4;
          ctx.fillStyle = _rgba(T.blue, 0.04 + norm * 0.12);
          ctx.globalAlpha = gAlpha * knownReveal;
          ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.fill();
        } else if (isFilled) {
          ctx.fillStyle = _rgba(T.cyan, 0.06);
          ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.fill();
        } else {
          ctx.fillStyle = T.surface;
          ctx.globalAlpha = gAlpha * 0.3;
          ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.fill();
        }

        // Cell border
        ctx.strokeStyle = T.border;
        ctx.lineWidth = 0.5;
        ctx.globalAlpha = gAlpha * 0.3;
        ctx.beginPath(); ctx.roundRect(cx + inset, cy + inset, cw, ch, 2 * s); ctx.stroke();
        ctx.globalAlpha = gAlpha;

        // Value text
        const fontSize = Math.max(8, (mobile ? 9 : 11) * s);
        ctx.font = `600 ${fontSize}px 'IBM Plex Mono', monospace`;
        ctx.textAlign = 'center';
        const tx = cx + cellW / 2;
        const ty = cy + cellH / 2 + fontSize * 0.35;

        if (isKnown) {
          // Star rating display
          ctx.fillStyle = T.blue;
          ctx.globalAlpha = gAlpha * knownReveal * 0.9;
          ctx.fillText(ratings[u][i].toString(), tx, ty);

          // Small star icon
          if (!mobile) {
            ctx.font = `400 ${Math.max(5, 6 * s)}px 'IBM Plex Mono', monospace`;
            ctx.fillStyle = T.textMut;
            ctx.globalAlpha = gAlpha * knownReveal * 0.5;
            ctx.fillText('★', tx + fontSize * 0.5, ty - fontSize * 0.2);
          }
        } else if (isFilled || isCurrent) {
          const val = predicted[u][i];
          const textColor = T.cyan;
          ctx.fillStyle = textColor;
          ctx.globalAlpha = gAlpha * (isCurrent ? 0.6 : 0.75);
          ctx.fillText(val.toFixed(1), tx, ty);
        } else {
          // Empty cell marker
          ctx.fillStyle = T.textMut;
          ctx.globalAlpha = gAlpha * 0.2;
          ctx.fillText('?', tx, ty);
        }
      }
    }

    /* ── Column sweep indicator ── */
    if (fillP > 0 && fillP < 1 && currentFill) {
      const beamX = padL + currentFill.i * cellW + cellW / 2;
      ctx.strokeStyle = T.amber;
      ctx.lineWidth = 1 * s;
      ctx.globalAlpha = gAlpha * (0.2 + Math.sin(t * 6) * 0.1);
      ctx.setLineDash([3 * s, 3 * s]);
      ctx.beginPath();
      ctx.moveTo(beamX, padT - 5 * s);
      ctx.lineTo(beamX, padT + gridH + 5 * s);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    /* ── Top-left label ── */
    ctx.globalAlpha = gAlpha;
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText('COLLABORATIVE FILTER', 28 * s, 18 * s);

    // Status dot
    const pulse = Math.sin(t * 5) * 0.3 + 0.7;
    ctx.beginPath();
    ctx.arc(14 * s, 15 * s, Math.max(3, 4 * s), 0, Math.PI * 2);
    if (fillP > 0 && fillP < 1) { ctx.fillStyle = T.amber; ctx.globalAlpha = gAlpha * pulse; }
    else if (highlightP > 0 && highlightP < 1) { ctx.fillStyle = T.cyan; ctx.globalAlpha = gAlpha * pulse; }
    else if (ct >= 8 && ct < 10.5) { ctx.fillStyle = T.green; ctx.globalAlpha = gAlpha; }
    else { ctx.fillStyle = T.textMut; ctx.globalAlpha = gAlpha * 0.5; }
    ctx.fill();

    // Phase label
    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut;
    ctx.globalAlpha = gAlpha;
    let phaseText = 'LOADING';
    if (ct < 1.5) phaseText = 'KNOWN RATINGS';
    else if (ct < 6) phaseText = `PREDICTING ${filledCount}/${fillOrder.length}`;
    else if (ct < 8) phaseText = 'TOP PICKS';
    else if (ct < 10.5) phaseText = 'COMPLETE';
    else phaseText = 'RESETTING';
    ctx.fillText(phaseText, 28 * s, 30 * s);

    /* ── Legend ── */
    ctx.globalAlpha = gAlpha * 0.6;
    ctx.font = `400 ${Math.max(6, 7 * s)}px 'IBM Plex Mono', monospace`;
    ctx.textAlign = 'left';
    const legY = H - 10 * s;
    // Known
    ctx.fillStyle = T.blue;
    ctx.fillRect(16 * s, legY - 5 * s, 8 * s, 8 * s);
    ctx.fillStyle = T.textMut;
    ctx.fillText('KNOWN', 28 * s, legY + 2 * s);
    // Predicted
    ctx.fillStyle = T.cyan;
    ctx.fillRect(74 * s, legY - 5 * s, 8 * s, 8 * s);
    ctx.fillStyle = T.textMut;
    ctx.fillText('PREDICTED', 86 * s, legY + 2 * s);
    // Recommended
    if (highlightP > 0) {
      ctx.fillStyle = T.green;
      ctx.fillRect(148 * s, legY - 5 * s, 8 * s, 8 * s);
      ctx.fillStyle = T.textMut;
      ctx.globalAlpha = gAlpha * 0.6 * highlightE;
      ctx.fillText('RECOMMENDED', 160 * s, legY + 2 * s);
    }

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
