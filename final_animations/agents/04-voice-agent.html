<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voice Agent — Conversational AI</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090d;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'IBM Plex Mono', -apple-system, monospace;
  }
  .wrap { width: 94vw; max-width: 900px; }
  canvas { display: block; width: 100%; height: 520px; border-radius: 8px; background: #0d1117; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 2px; color: #484f58; font-size: 10px; letter-spacing: 0.1em;
  }
  .meta span { color: #39d2c0; }
  @media (max-width: 600px) { canvas { height: 420px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrap">
  <div class="meta">
    <div>VOICE AGENT <span>/ SPEECH INTERFACE</span></div>
    <div>REAL-TIME</div>
  </div>
  <canvas id="c"></canvas>
</div>

<script>
(() => {
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.35)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.3)',
    red: '#f85149',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  // --- Color override via postMessage ---
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);T.cyanDim=_rgba(c.cyan,0.08);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);T.greenDim=_rgba(c.green,0.08);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);T.amberDim=_rgba(c.amber,0.08);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);T.purpleDim=_rgba(c.purple,0.08);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });

  let mobile = window.innerWidth < 600;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    mobile = window.innerWidth < 600;
    const dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function S(w) { return Math.max(0.45, w / 600); }
  function shadow(c, b) { if (!mobile) { ctx.shadowColor = c; ctx.shadowBlur = b; } }
  function drawGlow(x, y, r, c) {
    if (mobile) r *= 0.6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  function colorAlpha(hex, a) {
    if (hex.startsWith('rgba')) return hex.replace(/[\d.]+\)$/, `${a})`);
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ═══════════════════════════════════════════
     CONVERSATION SCRIPT
     Each turn: phase, who is speaking, transcript text
     ═══════════════════════════════════════════ */
  const CONVERSATIONS = [
    [
      { who: 'user',  text: 'Hey, what\'s the weather like in Berlin?' },
      { who: 'think', text: '' },
      { who: 'agent', text: 'It\'s currently 12 degrees and partly cloudy in Berlin.' },
      { who: 'user',  text: 'Should I bring a jacket?' },
      { who: 'think', text: '' },
      { who: 'agent', text: 'Yes, I\'d recommend a light jacket. Temperatures drop to 7 degrees tonight.' },
    ],
    [
      { who: 'user',  text: 'Schedule a meeting with Sarah for tomorrow at 3.' },
      { who: 'think', text: '' },
      { who: 'agent', text: 'Done. I\'ve scheduled a meeting with Sarah tomorrow at 3 PM.' },
      { who: 'user',  text: 'Add a reminder 30 minutes before.' },
      { who: 'think', text: '' },
      { who: 'agent', text: 'Reminder set for 2:30 PM. You\'ll get a notification.' },
    ],
  ];

  const cycleDur = 18; // seconds per full conversation

  /* ═══════════════════════════════════════════
     AGENT STATE MACHINE
     States: idle → listening → thinking → speaking → (repeat or idle)
     ═══════════════════════════════════════════ */

  // Timeline: each turn gets a slot
  function getState(cycleT, conv) {
    const turnDur = 1 / conv.length;
    const turnIdx = Math.min(conv.length - 1, Math.floor(cycleT / turnDur));
    const turnProgress = (cycleT - turnIdx * turnDur) / turnDur;
    const turn = conv[turnIdx];

    // Fade out at very end
    if (cycleT > 0.92) return { state: 'idle', intensity: 0, text: '', turnProgress: 0, fadeOut: (cycleT - 0.92) / 0.08 };

    if (turn.who === 'user') {
      // User speaking: ramp in 0-0.1, speak 0.1-0.8, ramp out 0.8-1
      let intensity;
      if (turnProgress < 0.1) intensity = turnProgress / 0.1;
      else if (turnProgress < 0.8) intensity = 0.6 + 0.4 * Math.sin(turnProgress * 20);
      else intensity = 1 - (turnProgress - 0.8) / 0.2;
      const textProgress = Math.max(0, Math.min(1, (turnProgress - 0.05) / 0.7));
      const visChars = Math.floor(textProgress * turn.text.length);
      return { state: 'listening', intensity: Math.max(0, intensity), text: turn.text.slice(0, visChars), fullText: turn.text, turnProgress, fadeOut: 0 };
    }
    if (turn.who === 'think') {
      return { state: 'thinking', intensity: 0.3 + 0.2 * Math.sin(turnProgress * 12), text: '', turnProgress, fadeOut: 0 };
    }
    // Agent speaking
    let intensity;
    if (turnProgress < 0.08) intensity = turnProgress / 0.08;
    else if (turnProgress < 0.75) intensity = 0.5 + 0.5 * Math.sin(turnProgress * 18);
    else intensity = 1 - (turnProgress - 0.75) / 0.25;
    const textProgress = Math.max(0, Math.min(1, (turnProgress - 0.05) / 0.7));
    const visChars = Math.floor(textProgress * turn.text.length);
    return { state: 'speaking', intensity: Math.max(0, intensity), text: turn.text.slice(0, visChars), fullText: turn.text, turnProgress, fadeOut: 0 };
  }

  /* ═══════════════════════════════════════════
     ORB RING RENDERING
     ═══════════════════════════════════════════ */
  function drawOrb(cx, cy, t, state, intensity, s) {
    const baseR = 45 * s;

    // Color per state
    let primaryColor, glowColor, secondaryColor;
    if (state === 'listening') {
      primaryColor = T.cyan; glowColor = T.cyanGlow; secondaryColor = T.blue;
    } else if (state === 'thinking') {
      primaryColor = T.amber; glowColor = T.amberGlow; secondaryColor = T.purple;
    } else if (state === 'speaking') {
      primaryColor = T.purple; glowColor = T.purpleGlow; secondaryColor = T.cyan;
    } else {
      primaryColor = T.borderLight; glowColor = 'rgba(48,54,61,0.2)'; secondaryColor = T.border;
    }

    // Background glow
    drawGlow(cx, cy, baseR * (2.5 + intensity * 1.5), colorAlpha(primaryColor, 0.06 + intensity * 0.08));

    // Outer morphing ring — multiple overlapping sine-distorted circles
    const ringCount = mobile ? 2 : 3;
    for (let r = 0; r < ringCount; r++) {
      const ringR = baseR + r * 8 * s;
      const ringAlpha = (0.15 + intensity * 0.35) * (1 - r * 0.25);
      const speed = 1.2 + r * 0.4;
      const segments = mobile ? 60 : 90;

      ctx.beginPath();
      for (let i = 0; i <= segments; i++) {
        const angle = (i / segments) * Math.PI * 2;
        // Organic distortion from intensity
        const distort = intensity * 12 * s * (
          Math.sin(angle * 3 + t * speed) * 0.5 +
          Math.sin(angle * 5 - t * speed * 0.7) * 0.3 +
          Math.sin(angle * 7 + t * speed * 1.3) * 0.2
        );
        const pr = ringR + distort;
        const px = cx + Math.cos(angle) * pr;
        const py = cy + Math.sin(angle) * pr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();

      ctx.strokeStyle = colorAlpha(r === 0 ? primaryColor : secondaryColor, ringAlpha);
      ctx.lineWidth = (2 - r * 0.4) * s;
      if (r === 0 && !mobile) shadow(glowColor, 12 * s * intensity);
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Inner filled core — subtle breathing
    const coreR = baseR * (0.35 + intensity * 0.15 + Math.sin(t * 2) * 0.05);
    const coreGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, coreR);
    coreGrad.addColorStop(0, colorAlpha(primaryColor, 0.25 + intensity * 0.2));
    coreGrad.addColorStop(0.7, colorAlpha(primaryColor, 0.05));
    coreGrad.addColorStop(1, 'transparent');
    ctx.fillStyle = coreGrad;
    ctx.beginPath(); ctx.arc(cx, cy, coreR, 0, Math.PI * 2); ctx.fill();

    // Orbiting particles when active
    if (intensity > 0.15 && !mobile) {
      const particleCount = Math.floor(6 + intensity * 8);
      for (let p = 0; p < particleCount; p++) {
        const pAngle = (p / particleCount) * Math.PI * 2 + t * (0.8 + p * 0.05);
        const pDist = baseR + 20 * s + Math.sin(t * 2 + p * 1.5) * 10 * s * intensity;
        const px = cx + Math.cos(pAngle) * pDist;
        const py = cy + Math.sin(pAngle) * pDist;
        const pSize = (1 + intensity * 1.5 + Math.sin(t * 4 + p) * 0.5) * s;
        ctx.beginPath(); ctx.arc(px, py, pSize, 0, Math.PI * 2);
        ctx.fillStyle = colorAlpha(primaryColor, 0.3 + intensity * 0.3);
        ctx.fill();
      }
    }

    // Waveform ring (only when speaking or listening)
    if ((state === 'speaking' || state === 'listening') && intensity > 0.1) {
      const waveR = baseR + 28 * s;
      const waveSegments = mobile ? 50 : 80;
      ctx.beginPath();
      for (let i = 0; i <= waveSegments; i++) {
        const angle = (i / waveSegments) * Math.PI * 2;
        const waveAmp = intensity * 8 * s * (
          Math.sin(angle * 8 + t * 4) * 0.6 +
          Math.sin(angle * 13 - t * 6) * 0.3 +
          Math.sin(angle * 21 + t * 3) * 0.1
        );
        const wr = waveR + waveAmp;
        const px = cx + Math.cos(angle) * wr;
        const py = cy + Math.sin(angle) * wr;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.strokeStyle = colorAlpha(primaryColor, 0.12 + intensity * 0.15);
      ctx.lineWidth = 1 * s;
      ctx.stroke();
    }
  }

  /* ═══════════════════════════════════════════
     STATE LABEL (around the orb)
     ═══════════════════════════════════════════ */
  function drawStateLabel(cx, cy, baseR, state, t, s) {
    const labelR = baseR + (mobile ? 40 : 55) * s;
    let label, color;
    if (state === 'listening') { label = 'LISTENING'; color = T.cyan; }
    else if (state === 'thinking') { label = 'PROCESSING'; color = T.amber; }
    else if (state === 'speaking') { label = 'SPEAKING'; color = T.purple; }
    else { label = 'READY'; color = T.textMut; }

    const fs = Math.max(7, 8 * s);
    ctx.font = `500 ${fs}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, cy - labelR);

    // Animated dots for thinking
    if (state === 'thinking') {
      const dots = '.'.repeat(1 + Math.floor(t * 3) % 3);
      ctx.fillText(dots, cx + ctx.measureText(label).width / 2 + 8 * s, cy - labelR);
    }
  }

  /* ═══════════════════════════════════════════
     TRANSCRIPT AREA
     ═══════════════════════════════════════════ */
  function drawTranscript(text, fullText, state, cx, y, t, s) {
    if (!text && state !== 'thinking') return;

    const mono = "'IBM Plex Mono', monospace";
    const fs = Math.max(10, 13 * s);
    const maxW = W * 0.75;
    const isUser = state === 'listening';
    const color = isUser ? T.textSec : T.text;
    const accentColor = isUser ? T.cyan : T.purple;

    // Role indicator
    const roleFs = Math.max(7, 8 * s);
    ctx.font = `600 ${roleFs}px ${mono}`;
    ctx.fillStyle = accentColor;
    ctx.textAlign = 'center';
    const roleLabel = isUser ? '▸ USER' : '◂ AGENT';
    ctx.fillText(roleLabel, cx, y - 20 * s);

    if (state === 'thinking') {
      // Thinking dots animation
      ctx.font = `400 ${fs}px ${mono}`;
      ctx.fillStyle = T.amber;
      ctx.textAlign = 'center';
      const dotCount = 1 + Math.floor(t * 2.5) % 3;
      ctx.fillText('●'.repeat(dotCount) + '○'.repeat(3 - dotCount), cx, y + fs);
      return;
    }

    // Wrap and draw text
    ctx.font = `400 ${fs}px ${mono}`;
    ctx.textAlign = 'center';

    // Simple word wrap
    const words = (fullText || text).split(' ');
    const lines = [];
    let line = '';
    for (const word of words) {
      const test = line ? line + ' ' + word : word;
      if (ctx.measureText(test).width > maxW && line) {
        lines.push(line); line = word;
      } else {
        line = test;
      }
    }
    if (line) lines.push(line);

    const lineH = fs * 1.6;
    let charCount = 0;

    for (let li = 0; li < lines.length; li++) {
      const lineText = lines[li];
      const ly = y + li * lineH;

      // Determine how many chars of this line are visible
      const lineStart = charCount;
      const lineEnd = charCount + lineText.length;
      const visibleInLine = Math.max(0, Math.min(lineText.length, text.length - lineStart));

      if (visibleInLine <= 0) {
        // Ghost text
        ctx.globalAlpha = 0.1;
        ctx.fillStyle = T.textMut;
        ctx.fillText(lineText, cx, ly);
        ctx.globalAlpha = 1;
      } else {
        const visibleText = lineText.slice(0, visibleInLine);
        const remainText = lineText.slice(visibleInLine);

        // Draw visible portion
        const fullLineW = ctx.measureText(lineText).width;
        const startX = cx - fullLineW / 2;

        ctx.textAlign = 'left';
        ctx.fillStyle = color;
        if (!mobile && visibleInLine === lineText.length) {
          // Fully revealed line
        } else if (!mobile) {
          shadow(isUser ? T.cyanGlow : T.purpleGlow, 4 * s);
        }
        ctx.fillText(visibleText, startX, ly);
        ctx.shadowBlur = 0;

        // Ghost remainder
        if (remainText) {
          const visW = ctx.measureText(visibleText).width;
          ctx.globalAlpha = 0.1;
          ctx.fillStyle = T.textMut;
          ctx.fillText(remainText, startX + visW, ly);
          ctx.globalAlpha = 1;
        }

        // Cursor at end of visible text
        if (visibleInLine > 0 && visibleInLine < lineText.length + 1 && text.length < (fullText || text).length) {
          const visW = ctx.measureText(visibleText).width;
          const cursorX = startX + visW + 2 * s;
          if (Math.sin(t * 8) > 0) {
            ctx.fillStyle = accentColor;
            ctx.fillRect(cursorX, ly - fs * 0.7, 1.5 * s, fs);
          }
        }

        ctx.textAlign = 'center';
      }

      charCount += lineText.length + 1; // +1 for space
    }
  }

  /* ═══════════════════════════════════════════
     SOUND LEVEL BARS (bottom)
     ═══════════════════════════════════════════ */
  function drawSoundBars(cx, y, t, intensity, state, s) {
    const barCount = mobile ? 24 : 40;
    const totalW = (mobile ? 200 : 320) * s;
    const barW = totalW / barCount * 0.6;
    const barGap = totalW / barCount * 0.4;
    const maxBarH = 18 * s;
    const startX = cx - totalW / 2;

    const color = state === 'listening' ? T.cyan :
                  state === 'speaking' ? T.purple :
                  state === 'thinking' ? T.amber : T.borderLight;

    for (let i = 0; i < barCount; i++) {
      const x = startX + i * (barW + barGap);
      // Symmetric from center
      const centerDist = Math.abs(i - barCount / 2) / (barCount / 2);
      const envelope = 1 - centerDist * centerDist;

      let h;
      if (intensity < 0.05) {
        h = 2 * s;
      } else {
        const wave = Math.sin(i * 0.5 + t * 4) * 0.4 +
                     Math.sin(i * 0.3 - t * 6) * 0.3 +
                     Math.sin(i * 0.8 + t * 2) * 0.3;
        h = maxBarH * envelope * intensity * (0.4 + 0.6 * Math.abs(wave));
        h = Math.max(2 * s, h);
      }

      ctx.fillStyle = colorAlpha(color, 0.3 + intensity * 0.4 * envelope);
      ctx.beginPath();
      ctx.roundRect(x, y - h / 2, barW, h, 1);
      ctx.fill();
    }
  }

  /* ═══════════════════════════════════════════
     MAIN DRAW LOOP
     ═══════════════════════════════════════════ */
  function draw(ts) {
    if (!draw.start) draw.start = ts;
    const t = (ts - draw.start) / 1000;
    const s = S(W);
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5;
    ctx.globalAlpha = mobile ? 0.15 : 0.25;
    const gsp = 40 * s;
    for (let y = 0; y <= H; y += gsp) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    if (!mobile) {
      for (let x = 0; x <= W; x += gsp) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Current conversation
    const convIdx = Math.floor(t / cycleDur) % CONVERSATIONS.length;
    const conv = CONVERSATIONS[convIdx];
    const cycleT = (t % cycleDur) / cycleDur;

    const agentState = getState(cycleT, conv);

    // Layout
    const cx = W / 2;
    const orbY = H * 0.33;
    const transcriptY = H * 0.68;
    const barsY = H * 0.85;

    // Draw orb
    drawOrb(cx, orbY, t, agentState.state, agentState.intensity, s);

    // State label
    drawStateLabel(cx, orbY, 45, agentState.state, t, s);

    // Sound bars
    drawSoundBars(cx, barsY, t, agentState.intensity, agentState.state, s);

    // Transcript
    drawTranscript(agentState.text, agentState.fullText, agentState.state, cx, transcriptY, t, s);

    // Fade out
    if (agentState.fadeOut > 0) {
      ctx.fillStyle = colorAlpha(T.void, agentState.fadeOut);
      ctx.fillRect(0, 0, W, H);
    }

    // Status top-left
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText('VOICE AGENT', 28 * s, 18 * s);
    const dotOn = agentState.state !== 'idle';
    ctx.beginPath(); ctx.arc(14 * s, 15 * s, Math.max(3, 4 * s), 0, Math.PI * 2);
    ctx.fillStyle = dotOn ? T.green : T.textMut; ctx.fill();

    // Latency metric top-right
    if (agentState.state !== 'idle') {
      const latency = agentState.state === 'thinking'
        ? (280 + Math.sin(t * 1.5) * 40).toFixed(0) + 'ms'
        : (42 + Math.sin(t * 2.3) * 8).toFixed(0) + 'ms';
      ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.textMut; ctx.textAlign = 'right';
      ctx.fillText(`latency: ${latency}`, W - 10 * s, 18 * s);
    }

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
