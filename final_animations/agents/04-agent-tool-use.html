<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot — Agent Tool Use</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090d;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'IBM Plex Mono', -apple-system, monospace;
  }
  .wrap { width: 94vw; max-width: 900px; }
  canvas { display: block; width: 100%; height: 450px; border-radius: 8px; background: #0d1117; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 2px; color: #484f58; font-size: 10px; letter-spacing: 0.1em;
  }
  .meta span { color: #58a6ff; }
  @media (max-width: 600px) { canvas { height: 350px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrap">
  <div class="meta">
    <div>CHATBOT <span>/ AGENT TOOL USE</span></div>
    <div>EXAMPLE 04</div>
  </div>
  <canvas id="c"></canvas>
</div>

<script>
(() => {
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)', blueDim: 'rgba(88,166,255,0.08)',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)', cyanDim: 'rgba(57,210,192,0.08)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)', greenDim: 'rgba(63,185,80,0.08)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.35)', purpleDim: 'rgba(188,140,255,0.08)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.35)', amberDim: 'rgba(210,153,34,0.08)',
    red: '#f85149', redGlow: 'rgba(248,81,73,0.4)',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  // --- Color override via postMessage ---
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);T.cyanDim=_rgba(c.cyan,0.08);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);T.greenDim=_rgba(c.green,0.08);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);T.amberDim=_rgba(c.amber,0.08);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);T.purpleDim=_rgba(c.purple,0.08);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });

  let mobile = window.innerWidth < 600;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    mobile = window.innerWidth < 600;
    const dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function S(w) { return Math.max(0.45, w / 600); }
  function shadow(c, b) { if (!mobile) { ctx.shadowColor = c; ctx.shadowBlur = b; } }
  function drawGlow(x, y, r, c) {
    if (mobile) r *= 0.6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  function colorAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ── Agent scenarios ── */
  const scenarios = [
    {
      query: 'Find flights from NYC to London next Friday under $500',
      tools: [
        { name: 'search_flights', icon: '✈', color: T.cyan, glow: T.cyanGlow, dim: T.cyanDim, result: '3 flights found' },
        { name: 'check_prices', icon: '$', color: T.green, glow: T.greenGlow, dim: T.greenDim, result: '$420, $455, $489' },
        { name: 'filter_results', icon: '▼', color: T.amber, glow: T.amberGlow, dim: T.amberDim, result: 'All match criteria' },
      ],
      answer: 'Found 3 flights under $500. Best: Delta DL401 at $420, departing 8:15 AM.',
    },
    {
      query: 'Summarize the latest research on quantum error correction',
      tools: [
        { name: 'web_search', icon: '⊕', color: T.blue, glow: T.blueGlow, dim: T.blueDim, result: '12 papers found' },
        { name: 'read_document', icon: '◉', color: T.purple, glow: T.purpleGlow, dim: T.purpleDim, result: 'Parsed 3 PDFs' },
        { name: 'extract_key_points', icon: '◈', color: T.cyan, glow: T.cyanGlow, dim: T.cyanDim, result: '8 key findings' },
      ],
      answer: 'Surface codes achieve 99.8% fidelity. New topological approaches reduce qubit overhead by 40%.',
    },
    {
      query: 'Deploy the staging build and run integration tests',
      tools: [
        { name: 'run_build', icon: '⚙', color: T.amber, glow: T.amberGlow, dim: T.amberDim, result: 'Build succeeded' },
        { name: 'deploy_staging', icon: '▲', color: T.green, glow: T.greenGlow, dim: T.greenDim, result: 'Deployed v2.4.1' },
        { name: 'run_tests', icon: '✓', color: T.cyan, glow: T.cyanGlow, dim: T.cyanDim, result: '47/47 passed' },
        { name: 'notify_team', icon: '◆', color: T.purple, glow: T.purpleGlow, dim: T.purpleDim, result: 'Slack notified' },
      ],
      answer: 'Staging deployed successfully. All 47 integration tests passed. Team notified.',
    },
  ];

  const cycleDur = 16;

  /* ── Phases within a cycle (normalized 0→1) ── */
  // QUERY:     0.00 → 0.10  user query appears
  // THINKING:  0.10 → 0.18  agent "thinking" spinner
  // TOOLS:     0.18 → 0.62  tool calls fire sequentially
  // ANSWER:    0.62 → 0.85  final answer streams in
  // HOLD:      0.85 → 0.92  hold
  // FADE:      0.92 → 1.00  fade out

  // Particles for tool call connections
  let toolParticles = [];

  function draw(ts) {
    if (!draw.start) draw.start = ts;
    const t = (ts - draw.start) / 1000;
    const s = S(W);
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5;
    ctx.globalAlpha = mobile ? 0.2 : 0.35;
    const gsp = 40 * s;
    for (let y = 0; y <= H; y += gsp) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    if (!mobile) {
      for (let x = 0; x <= W; x += gsp) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    const scIdx = Math.floor(t / cycleDur) % scenarios.length;
    const sc = scenarios[scIdx];
    const cycleT = (t % cycleDur) / cycleDur;
    const tools = sc.tools;
    const toolCount = tools.length;

    const padX = 28 * s;
    const fontSize = Math.max(9, 11 * s);
    const smallFs = Math.max(7, 8 * s);

    // Layout
    const agentCx = W / 2;
    const agentCy = H * 0.28;
    const agentR = 28 * s;
    const toolR = 20 * s;
    const orbitR = mobile ? 150 * s : 130 * s;

    // ── Phase calculations ──
    const queryP = Math.max(0, Math.min(1, cycleT / 0.10));
    const thinkP = cycleT < 0.10 ? 0 : Math.min(1, (cycleT - 0.10) / 0.08);
    const toolPhaseStart = 0.18;
    const toolPhaseDur = 0.44;
    const toolEachDur = toolPhaseDur / toolCount;
    const answerP = cycleT < 0.62 ? 0 : Math.min(1, (cycleT - 0.62) / 0.23);

    // ── User query (top) ──
    if (queryP > 0) {
      ctx.globalAlpha = queryP;
      const qY = 42 * s;

      // Query bubble
      ctx.font = `400 ${fontSize}px 'IBM Plex Mono', monospace`;
      const qText = sc.query;
      const qW = Math.min(W - padX * 2 - 20 * s, ctx.measureText(qText).width + 24 * s);
      const qH = 32 * s;
      const qX = W / 2 - qW / 2;

      ctx.fillStyle = T.surface;
      ctx.beginPath(); ctx.roundRect(qX, qY, qW, qH, 6 * s); ctx.fill();
      ctx.strokeStyle = colorAlpha(T.blue, 0.4);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(qX, qY, qW, qH, 6 * s); ctx.stroke();

      // User icon
      ctx.font = `500 ${smallFs}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.blue; ctx.textAlign = 'left';
      ctx.fillText('USER ›', qX + 8 * s, qY - 6 * s);

      // Query text (clip to bubble)
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(qX + 8 * s, qY, qW - 16 * s, qH, 0);
      ctx.clip();
      ctx.font = `400 ${fontSize}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.text; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(qText, qX + 10 * s, qY + qH / 2);
      ctx.restore();
      ctx.textBaseline = 'alphabetic';

      ctx.globalAlpha = 1;
    }

    // ── Connection line from query to agent ──
    if (thinkP > 0) {
      ctx.beginPath();
      ctx.strokeStyle = colorAlpha(T.blue, 0.2);
      ctx.lineWidth = 1 * s;
      ctx.setLineDash([3 * s, 3 * s]);
      ctx.moveTo(W / 2, 62 * s);
      ctx.lineTo(W / 2, agentCy - agentR - 8 * s);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // ── Central agent node ──
    const agentActive = thinkP > 0;
    const agentPulse = agentActive ? 0.5 + Math.sin(t * 5) * 0.3 : 0.2;

    // Outer glow
    if (agentActive) {
      drawGlow(agentCx, agentCy, agentR * 2.5, T.purpleGlow);
    }

    // Agent circle
    ctx.beginPath();
    ctx.arc(agentCx, agentCy, agentR, 0, Math.PI * 2);
    ctx.fillStyle = T.purpleDim;
    ctx.fill();
    ctx.strokeStyle = colorAlpha(T.purple, 0.4 + agentPulse * 0.6);
    ctx.lineWidth = 2 * s;
    if (agentActive && !mobile) { shadow(T.purpleGlow, 10 * s); }
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Agent label
    ctx.font = `600 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.purple; ctx.textAlign = 'center';
    ctx.fillText('AGENT', agentCx, agentCy + 3 * s);

    // Thinking spinner arcs
    if (thinkP > 0 && cycleT < 0.62) {
      ctx.strokeStyle = colorAlpha(T.purple, 0.5);
      ctx.lineWidth = 2 * s;
      const spinAngle = t * 3;
      for (let i = 0; i < 3; i++) {
        const a0 = spinAngle + i * (Math.PI * 2 / 3);
        ctx.beginPath();
        ctx.arc(agentCx, agentCy, agentR + 6 * s, a0, a0 + 0.6);
        ctx.stroke();
      }
    }

    // ── Tool nodes arranged in arc below agent ──
    const toolNodes = [];
    const arcStart = Math.PI * 0.15;
    const arcEnd = Math.PI * 0.85;
    for (let i = 0; i < toolCount; i++) {
      const angle = toolCount === 1
        ? Math.PI * 0.5
        : arcStart + (i / (toolCount - 1)) * (arcEnd - arcStart);
      const tx = agentCx + Math.cos(angle) * orbitR * (mobile ? 0.85 : 1);
      const ty = agentCy + Math.sin(angle) * orbitR * 0.75;
      toolNodes.push({ x: tx, y: ty, angle });
    }

    // ── Draw tool connections and nodes ──
    for (let i = 0; i < toolCount; i++) {
      const tool = tools[i];
      const tn = toolNodes[i];

      // When does this tool fire?
      const toolStart = toolPhaseStart + i * toolEachDur;
      const toolEnd = toolStart + toolEachDur;
      const toolProgress = Math.max(0, Math.min(1, (cycleT - toolStart) / toolEachDur));
      const toolFired = cycleT >= toolStart;
      const toolDone = cycleT >= toolEnd;

      // Compute edge points on circle borders
      const dx = tn.x - agentCx, dy = tn.y - agentCy;
      const dist = Math.sqrt(dx * dx + dy * dy);
      const nx = dx / dist, ny = dy / dist;
      const agentEdgeX = agentCx + nx * agentR, agentEdgeY = agentCy + ny * agentR;
      const toolEdgeX = tn.x - nx * toolR, toolEdgeY = tn.y - ny * toolR;

      // Connection line from agent border to tool border
      ctx.beginPath();
      ctx.strokeStyle = toolFired
        ? colorAlpha(tool.color, 0.4 + toolProgress * 0.4)
        : colorAlpha(T.border, 0.3);
      ctx.lineWidth = (toolFired ? 1.5 : 1) * s;
      if (!toolFired) ctx.setLineDash([3 * s, 3 * s]);
      ctx.moveTo(agentEdgeX, agentEdgeY);
      ctx.lineTo(toolEdgeX, toolEdgeY);
      ctx.stroke();
      ctx.setLineDash([]);

      // Signal traveling from agent edge to tool edge
      if (toolFired && toolProgress < 0.5) {
        const sigP = toolProgress / 0.5;
        const sx = agentEdgeX + (toolEdgeX - agentEdgeX) * sigP;
        const sy = agentEdgeY + (toolEdgeY - agentEdgeY) * sigP;
        drawGlow(sx, sy, 12 * s, tool.glow);
        ctx.beginPath();
        ctx.arc(sx, sy, 3.5 * s, 0, Math.PI * 2);
        ctx.fillStyle = tool.color;
        shadow(tool.glow, 6 * s);
        ctx.fill();
        ctx.shadowBlur = 0;
      }

      // Return signal from tool edge to agent edge
      if (toolProgress > 0.5 && toolProgress < 1) {
        const retP = (toolProgress - 0.5) / 0.5;
        const rx = toolEdgeX + (agentEdgeX - toolEdgeX) * retP;
        const ry = toolEdgeY + (agentEdgeY - toolEdgeY) * retP;
        drawGlow(rx, ry, 10 * s, tool.glow);
        ctx.beginPath();
        ctx.arc(rx, ry, 3 * s, 0, Math.PI * 2);
        ctx.fillStyle = tool.color;
        ctx.fill();
      }

      // Tool node
      const nodeAlpha = toolFired ? 0.6 + toolProgress * 0.4 : 0.25;

      // Node glow when active
      if (toolFired && toolProgress < 1) {
        drawGlow(tn.x, tn.y, toolR * 2, tool.glow);
      }

      ctx.beginPath();
      ctx.arc(tn.x, tn.y, toolR, 0, Math.PI * 2);
      ctx.fillStyle = toolFired ? tool.dim : colorAlpha(T.surface, 0.6);
      ctx.fill();
      ctx.strokeStyle = colorAlpha(tool.color, nodeAlpha);
      ctx.lineWidth = (toolFired ? 2 : 1) * s;
      if (toolFired && !toolDone && !mobile) { shadow(tool.glow, 8 * s); }
      ctx.stroke();
      ctx.shadowBlur = 0;

      // Tool icon
      ctx.font = `400 ${Math.max(10, 13 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = colorAlpha(tool.color, nodeAlpha);
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(tool.icon, tn.x, tn.y + 1 * s);
      ctx.textBaseline = 'alphabetic';

      // Tool name label
      ctx.font = `500 ${Math.max(6, 8 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = colorAlpha(tool.color, toolFired ? 0.9 : 0.4);
      ctx.textAlign = 'center';
      ctx.fillText(tool.name, tn.x, tn.y + toolR + 12 * s);

      // Result badge (appears when tool completes)
      if (toolDone) {
        const badgeY = tn.y + toolR + 22 * s;
        ctx.font = `400 ${Math.max(6, 7 * s)}px 'IBM Plex Mono', monospace`;
        const resultW = ctx.measureText(tool.result).width + 12 * s;
        const badgeX = tn.x - resultW / 2;
        const badgeH = 14 * s;

        ctx.fillStyle = colorAlpha(tool.color, 0.08);
        ctx.beginPath(); ctx.roundRect(badgeX, badgeY, resultW, badgeH, 3 * s); ctx.fill();
        ctx.strokeStyle = colorAlpha(tool.color, 0.25);
        ctx.lineWidth = 0.5;
        ctx.beginPath(); ctx.roundRect(badgeX, badgeY, resultW, badgeH, 3 * s); ctx.stroke();

        ctx.fillStyle = colorAlpha(tool.color, 0.8);
        ctx.textAlign = 'center';
        ctx.fillText(tool.result, tn.x, badgeY + 10 * s);

        // Checkmark
        ctx.fillStyle = T.green;
        ctx.font = `600 ${Math.max(6, 7 * s)}px 'IBM Plex Mono', monospace`;
        ctx.fillText('✓', badgeX + resultW + 6 * s, badgeY + 10 * s);
      }

      // "Calling..." label during execution
      if (toolFired && !toolDone) {
        ctx.font = `400 ${Math.max(6, 7 * s)}px 'IBM Plex Mono', monospace`;
        ctx.fillStyle = colorAlpha(tool.color, 0.5 + Math.sin(t * 8) * 0.3);
        ctx.textAlign = 'center';
        ctx.fillText('calling...', tn.x, tn.y - toolR - 8 * s);
      }
    }

    // ── Step indicator along the left ──
    const steps = ['PARSE', 'PLAN', ...tools.map(t => t.name.toUpperCase()), 'SYNTHESIZE'];
    const stepCount = steps.length;
    const stepStartY = 80 * s;
    const stepGap = (H - stepStartY - 40 * s) / (stepCount - 1);
    const stepX = 14 * s;

    for (let i = 0; i < stepCount; i++) {
      const sy = stepStartY + i * stepGap;
      // Which step are we on?
      let stepActive = false;
      if (i === 0) stepActive = cycleT >= 0.02;
      else if (i === 1) stepActive = cycleT >= 0.10;
      else if (i < 2 + toolCount) stepActive = cycleT >= toolPhaseStart + (i - 2) * toolEachDur;
      else stepActive = cycleT >= 0.62;

      const stepDone = (i < stepCount - 1)
        ? (i === 0 ? cycleT >= 0.10 : i === 1 ? cycleT >= toolPhaseStart : i < 2 + toolCount ? cycleT >= toolPhaseStart + (i - 1) * toolEachDur : cycleT >= 0.85)
        : cycleT >= 0.85;

      // Vertical connector
      if (i < stepCount - 1) {
        ctx.beginPath();
        ctx.strokeStyle = stepActive ? colorAlpha(T.purple, 0.3) : colorAlpha(T.border, 0.2);
        ctx.lineWidth = 1;
        ctx.moveTo(stepX, sy + 6 * s);
        ctx.lineTo(stepX, sy + stepGap - 4 * s);
        ctx.stroke();
      }

      // Step dot
      ctx.beginPath();
      ctx.arc(stepX, sy, 3 * s, 0, Math.PI * 2);
      ctx.fillStyle = stepDone ? T.green : stepActive ? T.purple : T.textMut;
      ctx.fill();
    }

    // ── Final answer (bottom) ──
    if (answerP > 0) {
      const aY = H - 30 * s;
      const charCount = Math.floor(answerP * sc.answer.length);
      const ansText = sc.answer.substring(0, charCount);

      // Answer bubble
      ctx.font = `400 ${fontSize}px 'IBM Plex Mono', monospace`;
      const aW = Math.min(W - padX * 2 - 20 * s, ctx.measureText(sc.answer).width + 24 * s);
      const aH = 32 * s;
      const aX = W / 2 - aW / 2;

      ctx.fillStyle = T.purpleDim;
      ctx.beginPath(); ctx.roundRect(aX, aY, aW, aH, 6 * s); ctx.fill();
      ctx.strokeStyle = colorAlpha(T.purple, 0.3);
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(aX, aY, aW, aH, 6 * s); ctx.stroke();

      // Agent label
      ctx.font = `500 ${smallFs}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.purple; ctx.textAlign = 'left';
      ctx.fillText('AGENT ›', aX + 8 * s, aY - 6 * s);

      // Answer text with cursor
      ctx.save();
      ctx.beginPath();
      ctx.roundRect(aX + 8 * s, aY, aW - 16 * s, aH, 0);
      ctx.clip();
      ctx.font = `400 ${fontSize}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.text; ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
      ctx.fillText(ansText, aX + 10 * s, aY + aH / 2);
      ctx.restore();
      ctx.textBaseline = 'alphabetic';

      // Cursor
      if (answerP < 1) {
        const cursorX = aX + 10 * s + ctx.measureText(ansText).width;
        if (Math.sin(t * 10) > 0) {
          ctx.fillStyle = T.purple;
          ctx.fillRect(cursorX, aY + aH * 0.25, 1.5 * s, aH * 0.5);
        }
      }

      // Connection from agent border to answer
      ctx.beginPath();
      ctx.strokeStyle = colorAlpha(T.purple, 0.2);
      ctx.lineWidth = 1 * s;
      ctx.setLineDash([3 * s, 3 * s]);
      ctx.moveTo(W / 2, agentCy + agentR);
      ctx.lineTo(W / 2, aY - 8 * s);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // ── Fade out ──
    if (cycleT > 0.92) {
      const fadeOut = (cycleT - 0.92) / 0.08;
      ctx.fillStyle = colorAlpha(T.void, fadeOut);
      ctx.fillRect(0, 0, W, H);
    }

    // ── Status label top-left ──
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText('AGENT TOOL USE', 28 * s, 18 * s);
    const dotOn = Math.sin(t * 4) > 0;
    ctx.beginPath(); ctx.arc(14 * s, 15 * s, Math.max(3, 4 * s), 0, Math.PI * 2);
    ctx.fillStyle = dotOn ? T.green : T.textMut; ctx.fill();

    // Tool count top-right
    const completedTools = tools.filter((_, i) => cycleT >= toolPhaseStart + (i + 1) * toolEachDur).length;
    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'right';
    ctx.fillText(`TOOLS: ${completedTools}/${toolCount}`, W - 10 * s, 18 * s);

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
