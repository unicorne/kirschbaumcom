<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Optimization — Recommender System</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090d;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'IBM Plex Mono', -apple-system, monospace;
  }
  .wrap { width: 94vw; max-width: 900px; }
  canvas { display: block; width: 100%; height: 380px; border-radius: 8px; background: #0d1117; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 2px; color: #484f58; font-size: 10px; letter-spacing: 0.1em;
  }
  .meta span { color: #bc8cff; }
  @media (max-width: 600px) { canvas { height: 280px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
<div class="wrap">
  <div class="meta">
    <div>OPTIMIZATION <span>/ RECOMMENDER SYSTEM</span></div>
    <div>EXAMPLE 04</div>
  </div>
  <canvas id="c"></canvas>
</div>
<script>
(() => {
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)', blueDim: 'rgba(88,166,255,0.08)',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)',
    red: '#f85149', redGlow: 'rgba(248,81,73,0.4)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.3)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.3)',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  // --- Color override via postMessage ---
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);T.cyanDim=_rgba(c.cyan,0.08);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);T.greenDim=_rgba(c.green,0.08);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);T.amberDim=_rgba(c.amber,0.08);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);T.purpleDim=_rgba(c.purple,0.08);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });

  let mobile = window.innerWidth < 600;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    mobile = window.innerWidth < 600;
    const dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function S(w) { return Math.max(0.45, w / 600); }
  function shadow(c, b) { if (!mobile) { ctx.shadowColor = c; ctx.shadowBlur = b; } }
  function drawGlow(x, y, r, c) {
    if (mobile) r *= 0.6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }

  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeInOut(t) { return t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

  /* ── Seeded random ── */
  let seed = 77;
  function srand() { seed = (seed * 16807 + 0) % 2147483647; return (seed - 1) / 2147483646; }
  function srandReset() { seed = 77; }

  /* ── Data ── */
  const NUM_USERS = 6;
  const NUM_ITEMS = 8;

  // Generate deterministic embeddings (initial scattered, final clustered)
  srandReset();
  const users = [];
  for (let i = 0; i < NUM_USERS; i++) {
    const angle = (i / NUM_USERS) * Math.PI * 2 + srand() * 0.5;
    const dist = 0.25 + srand() * 0.25;
    users.push({
      label: 'U' + (i + 1),
      // Scattered embedding positions (normalized 0-1)
      ex0: 0.5 + Math.cos(angle) * dist,
      ey0: 0.5 + Math.sin(angle) * dist,
      // Converged positions — will be set per-cluster
      ex1: 0, ey1: 0,
      cluster: i % 3, // 3 clusters
    });
  }

  const items = [];
  for (let i = 0; i < NUM_ITEMS; i++) {
    const angle = (i / NUM_ITEMS) * Math.PI * 2 + srand() * 0.6;
    const dist = 0.2 + srand() * 0.3;
    items.push({
      label: 'I' + (i + 1),
      ex0: 0.5 + Math.cos(angle) * dist,
      ey0: 0.5 + Math.sin(angle) * dist,
      ex1: 0, ey1: 0,
      cluster: i % 3,
    });
  }

  // Set converged positions: cluster centers
  const clusterCenters = [
    { x: 0.3, y: 0.3 },
    { x: 0.7, y: 0.35 },
    { x: 0.5, y: 0.72 },
  ];

  srandReset(); srand(); srand(); srand(); // advance seed
  users.forEach(u => {
    const cc = clusterCenters[u.cluster];
    u.ex1 = cc.x + (srand() - 0.5) * 0.1;
    u.ey1 = cc.y + (srand() - 0.5) * 0.1;
  });
  items.forEach(it => {
    const cc = clusterCenters[it.cluster];
    it.ex1 = cc.x + (srand() - 0.5) * 0.12;
    it.ey1 = cc.y + (srand() - 0.5) * 0.12;
  });

  // Recommendation matches: each user gets 1-2 items
  // Scores are deterministic
  srandReset(); for (let i = 0; i < 10; i++) srand();
  const matches = [];
  users.forEach((u, ui) => {
    // Primary match: same cluster item
    const sameClusterItems = items.map((it, idx) => ({ it, idx })).filter(o => o.it.cluster === u.cluster);
    const primary = sameClusterItems[ui % sameClusterItems.length];
    matches.push({ user: ui, item: primary.idx, score: 0.85 + srand() * 0.14 });
    // Secondary weaker match
    const otherItems = items.map((it, idx) => ({ it, idx })).filter(o => o.it.cluster !== u.cluster);
    const secondary = otherItems[ui % otherItems.length];
    matches.push({ user: ui, item: secondary.idx, score: 0.55 + srand() * 0.2 });
  });

  /* ── Timing (11s loop) ── */
  const CYCLE = 11;
  // Phase 0-3: scatter (embeddings spread)
  // Phase 3-6: converge (embeddings cluster)
  // Phase 6-9: match lines appear one by one
  // Phase 9-10: hold
  // Phase 10-11: fade restart

  function draw(ts) {
    if (!draw.start) draw.start = ts;
    const t = (ts - draw.start) / 1000;
    const s = S(W);
    const ct = t % CYCLE;
    ctx.clearRect(0, 0, W, H);

    const padL = 16 * s, padR = 16 * s, padT = 38 * s, padB = 14 * s;

    /* ── Grid background ── */
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5;
    ctx.globalAlpha = mobile ? 0.12 : 0.2;
    const gsp = 28 * s;
    for (let y = padT; y <= H - padB; y += gsp) {
      ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(W - padR, y); ctx.stroke();
    }
    if (!mobile) {
      for (let x = padL; x <= W - padR; x += gsp) {
        ctx.beginPath(); ctx.moveTo(x, padT); ctx.lineTo(x, H - padB); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    /* ── Layout regions ── */
    const userColX = padL + 38 * s;
    const itemColX = W - padR - 38 * s;
    const embedL = padL + 90 * s;
    const embedR = W - padR - 90 * s;
    const embedT = padT + 25 * s;
    const embedB = H - padB - 40 * s;
    const embedW = embedR - embedL;
    const embedH = embedB - embedT;

    /* ── Phase calculations ── */
    const convergeP = clamp((ct - 3) / 3, 0, 1); // 0 during scatter, 0->1 during converge
    const convergeE = easeInOut(convergeP);
    const matchP = clamp((ct - 6) / 3, 0, 1); // 0->1 during match phase
    const holdFade = ct > 10 ? clamp((ct - 10) / 1, 0, 1) : 0;
    const globalAlpha = 1 - holdFade;

    /* ── Fade-in at start ── */
    const fadeIn = clamp(ct / 0.8, 0, 1);

    /* ── User nodes (left column) ── */
    const userSpacing = (H - padT - padB - 60 * s) / (NUM_USERS - 1);
    const userStartY = padT + 30 * s;

    function getUserY(i) { return userStartY + i * userSpacing; }

    ctx.globalAlpha = globalAlpha * fadeIn;
    users.forEach((u, i) => {
      const x = userColX;
      const y = getUserY(i);
      const r = (mobile ? 10 : 13) * s;

      // Currently matching user highlight
      const matchIdx = Math.floor(matchP * NUM_USERS);
      const isActive = matchP > 0 && matchP < 1 && matchIdx === i;

      if (isActive) {
        // Pulsing ring
        const pulse = Math.sin(t * 8) * 0.3 + 0.7;
        ctx.beginPath();
        ctx.arc(x, y, r + 5 * s, 0, Math.PI * 2);
        ctx.strokeStyle = T.cyan;
        ctx.lineWidth = 1.5 * s;
        ctx.globalAlpha = globalAlpha * pulse * 0.6;
        ctx.stroke();
        drawGlow(x, y, r * 2.5, T.cyanGlow);
        ctx.globalAlpha = globalAlpha;
      }

      // Circle
      if (!mobile) drawGlow(x, y, r * 2, T.blueGlow);
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.fillStyle = T.surface;
      ctx.fill();
      ctx.strokeStyle = T.blue;
      ctx.lineWidth = 1.8 * s;
      shadow(T.blueGlow, 6 * s);
      ctx.stroke();
      ctx.shadowBlur = 0;

      // User icon (small person silhouette)
      ctx.fillStyle = T.blue;
      ctx.beginPath();
      ctx.arc(x, y - 2 * s, 3 * s, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(x, y + 5 * s, 5 * s, Math.PI, 0);
      ctx.fill();

      // Label
      ctx.font = `500 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.textSec;
      ctx.textAlign = 'center';
      ctx.fillText(u.label, x, y + r + 12 * s);
    });

    /* ── Item nodes (right column) ── */
    const itemSpacing = (H - padT - padB - 60 * s) / (NUM_ITEMS - 1);
    const itemStartY = padT + 30 * s;

    function getItemY(i) { return itemStartY + i * itemSpacing; }

    items.forEach((it, i) => {
      const x = itemColX;
      const y = getItemY(i);
      const r = (mobile ? 8 : 11) * s;

      // Diamond shape
      if (!mobile) drawGlow(x, y, r * 2, T.purpleGlow);

      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.PI / 4);
      ctx.beginPath();
      ctx.rect(-r * 0.7, -r * 0.7, r * 1.4, r * 1.4);
      ctx.fillStyle = T.surface;
      ctx.fill();
      ctx.strokeStyle = T.purple;
      ctx.lineWidth = 1.8 * s;
      shadow(T.purpleGlow, 6 * s);
      ctx.stroke();
      ctx.shadowBlur = 0;
      ctx.restore();

      // Inner square
      ctx.save();
      ctx.translate(x, y);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = T.purple;
      ctx.globalAlpha = globalAlpha * 0.6;
      ctx.fillRect(-r * 0.25, -r * 0.25, r * 0.5, r * 0.5);
      ctx.globalAlpha = globalAlpha;
      ctx.restore();

      // Label
      ctx.font = `500 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.textSec;
      ctx.textAlign = 'center';
      ctx.fillText(it.label, x, y + r + 12 * s);
    });

    /* ── Embedding space (center) ── */
    // Border
    ctx.strokeStyle = T.border;
    ctx.lineWidth = 1 * s;
    ctx.globalAlpha = globalAlpha * 0.4;
    ctx.strokeRect(embedL - 4 * s, embedT - 4 * s, embedW + 8 * s, embedH + 8 * s);
    ctx.globalAlpha = globalAlpha;

    // Label
    ctx.font = `400 ${Math.max(6, 7 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut;
    ctx.textAlign = 'center';
    ctx.fillText('EMBEDDING SPACE', embedL + embedW / 2, embedT - 8 * s);

    // Crosshair axes
    ctx.strokeStyle = T.border;
    ctx.lineWidth = 0.5;
    ctx.globalAlpha = globalAlpha * 0.3;
    ctx.setLineDash([3 * s, 3 * s]);
    ctx.beginPath();
    ctx.moveTo(embedL + embedW / 2, embedT);
    ctx.lineTo(embedL + embedW / 2, embedB);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(embedL, embedT + embedH / 2);
    ctx.lineTo(embedR, embedT + embedH / 2);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.globalAlpha = globalAlpha;

    // User embeddings
    users.forEach((u, i) => {
      const ex = lerp(u.ex0, u.ex1, convergeE);
      const ey = lerp(u.ey0, u.ey1, convergeE);
      const px = embedL + ex * embedW;
      const py = embedT + ey * embedH;
      const r = (mobile ? 4 : 5) * s;

      if (!mobile && convergeE > 0.3) {
        drawGlow(px, py, r * 2.5, 'rgba(88,166,255,0.15)');
      }

      ctx.beginPath();
      ctx.arc(px, py, r, 0, Math.PI * 2);
      ctx.fillStyle = T.blue;
      ctx.globalAlpha = globalAlpha * 0.85;
      shadow(T.blueGlow, 4 * s);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = globalAlpha;
    });

    // Item embeddings
    items.forEach((it, i) => {
      const ex = lerp(it.ex0, it.ex1, convergeE);
      const ey = lerp(it.ey0, it.ey1, convergeE);
      const px = embedL + ex * embedW;
      const py = embedT + ey * embedH;
      const r = (mobile ? 3.5 : 4.5) * s;

      if (!mobile && convergeE > 0.3) {
        drawGlow(px, py, r * 2.5, 'rgba(188,140,255,0.15)');
      }

      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(Math.PI / 4);
      ctx.fillStyle = T.purple;
      ctx.globalAlpha = globalAlpha * 0.85;
      shadow(T.purpleGlow, 4 * s);
      ctx.fillRect(-r, -r, r * 2, r * 2);
      ctx.shadowBlur = 0;
      ctx.restore();
      ctx.globalAlpha = globalAlpha;
    });

    // Cluster boundaries (only when converged)
    if (convergeE > 0.5) {
      const clusterAlpha = (convergeE - 0.5) * 2;
      clusterCenters.forEach((cc, ci) => {
        const cx = embedL + cc.x * embedW;
        const cy = embedT + cc.y * embedH;
        const cr = 35 * s;
        ctx.beginPath();
        ctx.arc(cx, cy, cr, 0, Math.PI * 2);
        ctx.strokeStyle = T.borderLight;
        ctx.lineWidth = 0.8 * s;
        ctx.globalAlpha = globalAlpha * clusterAlpha * 0.3;
        ctx.setLineDash([2 * s, 3 * s]);
        ctx.stroke();
        ctx.setLineDash([]);
      });
      ctx.globalAlpha = globalAlpha;
    }

    /* ── Match connection lines ── */
    if (matchP > 0) {
      const totalMatches = matches.length;
      matches.forEach((m, mi) => {
        const matchTime = mi / totalMatches;
        const lineP = clamp((matchP - matchTime) * totalMatches / 2, 0, 1);
        if (lineP <= 0) return;

        const lineE = easeInOut(lineP);
        const ux = userColX;
        const uy = getUserY(m.user);
        const ix = itemColX;
        const iy = getItemY(m.item);

        const isStrong = m.score > 0.75;
        const lineColor = isStrong ? T.cyan : T.textMut;
        const lineGlow = isStrong ? T.cyanGlow : 'rgba(72,79,88,0.2)';

        // Bezier curve
        const cp1x = lerp(ux, ix, 0.35);
        const cp2x = lerp(ux, ix, 0.65);
        const cp1y = uy;
        const cp2y = iy;

        ctx.beginPath();
        ctx.moveTo(ux + 15 * s, uy);
        // Draw partial curve using lineE
        const steps = 30;
        const drawSteps = Math.floor(steps * lineE);
        for (let si = 1; si <= drawSteps; si++) {
          const pt = si / steps;
          const bx = Math.pow(1 - pt, 3) * (ux + 15 * s) + 3 * Math.pow(1 - pt, 2) * pt * cp1x + 3 * (1 - pt) * pt * pt * cp2x + Math.pow(pt, 3) * (ix - 15 * s);
          const by = Math.pow(1 - pt, 3) * uy + 3 * Math.pow(1 - pt, 2) * pt * cp1y + 3 * (1 - pt) * pt * pt * cp2y + Math.pow(pt, 3) * iy;
          ctx.lineTo(bx, by);
        }

        ctx.strokeStyle = lineColor;
        ctx.lineWidth = (isStrong ? 1.5 : 0.8) * s;
        ctx.globalAlpha = globalAlpha * (isStrong ? 0.7 : 0.25) * Math.min(1, lineP * 2);
        if (isStrong && !mobile) shadow(lineGlow, 5 * s);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = globalAlpha;

        // Score label along the line (when fully drawn)
        if (lineE > 0.8) {
          const labelAlpha = (lineE - 0.8) * 5;
          const midT = 0.5;
          const mx = Math.pow(1 - midT, 3) * (ux + 15 * s) + 3 * Math.pow(1 - midT, 2) * midT * cp1x + 3 * (1 - midT) * midT * midT * cp2x + Math.pow(midT, 3) * (ix - 15 * s);
          const my = Math.pow(1 - midT, 3) * uy + 3 * Math.pow(1 - midT, 2) * midT * cp1y + 3 * (1 - midT) * midT * midT * cp2y + Math.pow(midT, 3) * iy;

          // Background pill
          const scoreText = m.score.toFixed(2);
          ctx.font = `500 ${Math.max(6, 7 * s)}px 'IBM Plex Mono', monospace`;
          const tw = ctx.measureText(scoreText).width;
          ctx.fillStyle = T.surface;
          ctx.globalAlpha = globalAlpha * labelAlpha * 0.9;
          ctx.beginPath();
          ctx.roundRect(mx - tw / 2 - 3 * s, my - 6 * s, tw + 6 * s, 12 * s, 3 * s);
          ctx.fill();
          ctx.strokeStyle = isStrong ? T.cyan : T.border;
          ctx.lineWidth = 0.6 * s;
          ctx.stroke();

          ctx.fillStyle = isStrong ? T.cyan : T.textMut;
          ctx.globalAlpha = globalAlpha * labelAlpha;
          ctx.textAlign = 'center';
          ctx.fillText(scoreText, mx, my + 3 * s);
          ctx.globalAlpha = globalAlpha;
        }
      });
    }

    /* ── Top-left label: RECOMMENDER ── */
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.globalAlpha = globalAlpha;
    ctx.fillText('RECOMMENDER', 28 * s, 18 * s);

    // Status dot
    const isConverging = ct >= 3 && ct < 6;
    const isMatching = ct >= 6 && ct < 9;
    const isComplete = ct >= 9 && ct < 10;
    const pulse = Math.sin(t * 5) * 0.3 + 0.7;

    ctx.beginPath();
    ctx.arc(14 * s, 15 * s, Math.max(3, 4 * s), 0, Math.PI * 2);
    if (isMatching) { ctx.fillStyle = T.cyan; ctx.globalAlpha = globalAlpha * pulse; }
    else if (isConverging) { ctx.fillStyle = T.amber; ctx.globalAlpha = globalAlpha * pulse; }
    else if (isComplete) { ctx.fillStyle = T.green; ctx.globalAlpha = globalAlpha; }
    else { ctx.fillStyle = T.textMut; ctx.globalAlpha = globalAlpha * 0.5; }
    ctx.fill();
    ctx.globalAlpha = globalAlpha;

    // Phase label
    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut;
    let phaseText = 'INITIALIZING';
    if (ct < 3) phaseText = 'SCATTER';
    else if (ct < 6) phaseText = 'CONVERGING';
    else if (ct < 9) phaseText = 'MATCHING';
    else if (ct < 10) phaseText = 'COMPLETE';
    else phaseText = 'RESETTING';
    ctx.fillText(phaseText, 28 * s, 30 * s);

    ctx.globalAlpha = 1;
    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
