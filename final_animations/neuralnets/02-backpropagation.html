<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neural Network — Backpropagation Training</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090d;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'IBM Plex Mono', -apple-system, monospace;
  }
  .wrap { width: 94vw; max-width: 900px; }
  canvas { display: block; width: 100%; height: 420px; border-radius: 8px; background: #0d1117; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 2px; color: #484f58; font-size: 10px; letter-spacing: 0.1em;
  }
  .meta span { color: #bc8cff; }
  @media (max-width: 600px) { canvas { height: 340px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrap">
  <div class="meta">
    <div>NEURAL NETWORK <span>/ BACKPROPAGATION</span></div>
    <div>EXAMPLE 02</div>
  </div>
  <canvas id="c"></canvas>
</div>

<script>
(() => {
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)', blueDim: 'rgba(88,166,255,0.08)',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)',
    red: '#f85149', redGlow: 'rgba(248,81,73,0.4)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.3)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.3)',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  // --- Color override via postMessage ---
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);T.cyanDim=_rgba(c.cyan,0.08);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);T.greenDim=_rgba(c.green,0.08);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);T.amberDim=_rgba(c.amber,0.08);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);T.purpleDim=_rgba(c.purple,0.08);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });

  let mobile = window.innerWidth < 600;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    mobile = window.innerWidth < 600;
    const dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    buildNetwork();
  }

  function S(w) { return Math.max(0.45, w / 600); }
  function glow(x, y, r, c) {
    if (mobile) r *= 0.6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }

  /* ══════════════════════════════════════
     TARGET FUNCTION — the network learns this
     ══════════════════════════════════════ */
  const NUM_PTS = 50;
  // Target: a smooth multi-frequency curve
  function targetFn(x) {
    return Math.sin(x * 2.8) * 0.4
         + Math.sin(x * 5.2 + 1.3) * 0.2
         + Math.cos(x * 1.1) * 0.15;
  }

  // Predicted output curve — starts random, converges to target
  let predicted = new Float32Array(NUM_PTS);
  let predictedDisplay = new Float32Array(NUM_PTS); // smoothly animated version

  // Initialize prediction with random garbage
  function initPrediction() {
    for (let i = 0; i < NUM_PTS; i++) {
      predicted[i] = (Math.random() - 0.5) * 1.5;
    }
    predictedDisplay.set(predicted);
  }
  initPrediction();

  // Nudge prediction toward target (simulates one training step)
  // Aggressive learn rate so convergence is visible in 3 epochs
  function trainStep() {
    const learnRate = 0.45 + Math.random() * 0.1;
    for (let i = 0; i < NUM_PTS; i++) {
      const x = (i / (NUM_PTS - 1)) * Math.PI * 2;
      const tgt = targetFn(x);
      const error = tgt - predicted[i];
      predicted[i] += error * learnRate;
      predicted[i] += (Math.random() - 0.5) * 0.005;
    }
  }

  /* ══════════════════════════════════════
     NETWORK
     ══════════════════════════════════════ */
  const layerSizes = mobile ? [3, 4, 4, 2] : [4, 5, 5, 3];
  let nodes = [];
  let edges = [];

  // Network occupies the center band of the canvas
  function buildNetwork() {
    nodes = [];
    edges = [];
    const s = S(W);
    const netL = W * 0.22, netR = W * 0.78;
    const padT = 55 * s, padB = 50 * s;
    const usableW = netR - netL;
    const usableH = H * 0.52 - padT;
    const topOffset = padT + 10 * s;

    for (let l = 0; l < layerSizes.length; l++) {
      const count = layerSizes[l];
      const x = netL + (usableW * l / (layerSizes.length - 1));
      for (let n = 0; n < count; n++) {
        const y = topOffset + usableH * (n + 0.5) / count;
        nodes.push({ x, y, layer: l, fwdGlow: 0, bwdGlow: 0, gradMag: 0 });
      }
    }

    let offset = 0;
    for (let l = 0; l < layerSizes.length - 1; l++) {
      const curCount = layerSizes[l];
      const nextOffset = offset + curCount;
      const nextCount = layerSizes[l + 1];
      for (let i = 0; i < curCount; i++) {
        for (let j = 0; j < nextCount; j++) {
          edges.push({
            from: offset + i, to: nextOffset + j,
            weight: 0.3 + Math.random() * 0.7,
            gradFlash: 0,
          });
        }
      }
      offset = nextOffset;
    }
  }

  /* ══════════════════════════════════════
     TRAINING CYCLE STATE MACHINE
     ══════════════════════════════════════ */
  const PHASE_DUR = { forward: 2.2, loss: 0.8, backward: 2.2, update: 0.8, pause: 0.7 };
  const PHASES = ['forward', 'loss', 'backward', 'update', 'pause'];
  let phase = 'forward';
  let phaseT = 0;
  let epoch = 0;

  let currentLoss = 2.5;

  function computeLoss() {
    let mse = 0;
    for (let i = 0; i < NUM_PTS; i++) {
      const x = (i / (NUM_PTS - 1)) * Math.PI * 2;
      const diff = targetFn(x) - predicted[i];
      mse += diff * diff;
    }
    return mse / NUM_PTS;
  }

  let fwdSignals = [];
  let bwdSignals = [];

  function randomPath() {
    const path = [];
    let offset = 0;
    for (let l = 0; l < layerSizes.length; l++) {
      path.push(offset + Math.floor(Math.random() * layerSizes[l]));
      offset += layerSizes[l];
    }
    return path;
  }

  function reversePath() {
    return randomPath().reverse();
  }

  function startForward() {
    fwdSignals = [];
    const count = mobile ? 2 : 3;
    for (let i = 0; i < count; i++) {
      fwdSignals.push({ path: randomPath(), segment: 0, t: 0, delay: i * 0.2 });
    }
  }

  function startBackward() {
    bwdSignals = [];
    const count = mobile ? 2 : 3;
    for (let i = 0; i < count; i++) {
      bwdSignals.push({ path: reversePath(), segment: 0, t: 0, delay: i * 0.2 });
    }
  }

  startForward();

  /* ══════════════════════════════════════
     DRAW
     ══════════════════════════════════════ */
  function draw(ts) {
    if (!draw.start) draw.start = ts;
    const t = (ts - draw.start) / 1000;
    const dt = draw.lastT ? Math.min((ts - draw.lastT) / 1000, 0.05) : 0.016;
    draw.lastT = ts;
    const s = S(W);

    ctx.clearRect(0, 0, W, H);

    /* ── Phase state machine ── */
    phaseT += dt;
    if (phaseT >= PHASE_DUR[phase]) {
      phaseT = 0;
      const idx = PHASES.indexOf(phase);
      phase = PHASES[(idx + 1) % PHASES.length];

      if (phase === 'forward') {
        epoch++;
        startForward();
      } else if (phase === 'backward') {
        startBackward();
      } else if (phase === 'update') {
        for (const e of edges) {
          e.gradFlash = 0.8 + Math.random() * 0.2;
        }
        // Actually train — nudge predicted curve toward target
        trainStep();
        currentLoss = computeLoss();
      } else if (phase === 'pause') {
        // Reset after 3 epochs so the convergence loop replays
        if (epoch > 0 && epoch % 3 === 0) {
          initPrediction();
          currentLoss = computeLoss();
        }
      }
    }

    // Animate predictedDisplay toward predicted (smooth lerp)
    for (let i = 0; i < NUM_PTS; i++) {
      predictedDisplay[i] += (predicted[i] - predictedDisplay[i]) * Math.min(1, dt * 5);
    }

    /* ── Update forward signals ── */
    const speed = 2.4;
    if (phase === 'forward' || (phase === 'loss' && fwdSignals.length > 0)) {
      for (let i = fwdSignals.length - 1; i >= 0; i--) {
        const sig = fwdSignals[i];
        if (sig.delay > 0) { sig.delay -= dt; continue; }
        sig.t += dt * speed;
        if (sig.t >= 1) {
          if (sig.segment + 1 < sig.path.length) nodes[sig.path[sig.segment + 1]].fwdGlow = 1;
          sig.segment++; sig.t = 0;
          if (sig.segment >= sig.path.length - 1) fwdSignals.splice(i, 1);
        }
      }
    }

    /* ── Update backward signals ── */
    if (phase === 'backward' || (phase === 'update' && bwdSignals.length > 0)) {
      for (let i = bwdSignals.length - 1; i >= 0; i--) {
        const sig = bwdSignals[i];
        if (sig.delay > 0) { sig.delay -= dt; continue; }
        sig.t += dt * speed;
        if (sig.t >= 1) {
          if (sig.segment + 1 < sig.path.length) {
            nodes[sig.path[sig.segment + 1]].bwdGlow = 1;
            nodes[sig.path[sig.segment + 1]].gradMag = 0.5 + Math.random() * 0.5;
          }
          sig.segment++; sig.t = 0;
          if (sig.segment >= sig.path.length - 1) bwdSignals.splice(i, 1);
        }
      }
    }

    // Decay
    for (const n of nodes) {
      n.fwdGlow *= Math.pow(0.04, dt);
      n.bwdGlow *= Math.pow(0.04, dt);
      n.gradMag *= Math.pow(0.3, dt);
    }
    for (const e of edges) {
      e.gradFlash *= Math.pow(0.08, dt);
    }

    // Lit edges
    const fwdLit = new Set();
    for (const sig of fwdSignals) {
      if (sig.delay > 0 || sig.segment >= sig.path.length - 1) continue;
      fwdLit.add(sig.path[sig.segment] + '-' + sig.path[sig.segment + 1]);
    }
    const bwdLit = new Set();
    for (const sig of bwdSignals) {
      if (sig.delay > 0 || sig.segment >= sig.path.length - 1) continue;
      bwdLit.add(sig.path[sig.segment + 1] + '-' + sig.path[sig.segment]);
    }

    /* ── Draw edges ── */
    for (const e of edges) {
      const from = nodes[e.from], to = nodes[e.to];
      const isFwd = fwdLit.has(e.from + '-' + e.to);
      const isBwd = bwdLit.has(e.from + '-' + e.to);
      const hasGrad = e.gradFlash > 0.05;

      ctx.beginPath();
      ctx.moveTo(from.x, from.y);
      ctx.lineTo(to.x, to.y);

      if (isFwd) {
        ctx.strokeStyle = T.cyanGlow; ctx.lineWidth = 1.8 * s;
      } else if (isBwd) {
        ctx.strokeStyle = T.purpleGlow; ctx.lineWidth = 1.8 * s;
      } else if (hasGrad) {
        ctx.strokeStyle = `rgba(63,185,80,${e.gradFlash * 0.5})`;
        ctx.lineWidth = 1.5 * s * e.gradFlash;
      } else {
        ctx.strokeStyle = `rgba(33,38,45,${0.15 + e.weight * 0.25})`;
        ctx.lineWidth = 0.5 * s;
      }
      ctx.stroke();
    }

    /* ── Draw nodes ── */
    const nodeR = Math.max(3, 5 * s);
    for (const n of nodes) {
      const fg = n.fwdGlow, bg = n.bwdGlow, gm = n.gradMag;

      if (fg > 0.02) glow(n.x, n.y, nodeR * 7 * fg, T.cyanGlow);
      if (bg > 0.02) glow(n.x, n.y, nodeR * 7 * bg, T.purpleGlow);
      if (gm > 0.05) glow(n.x, n.y, nodeR * 5 * gm, T.greenGlow);

      const alpha = 0.15 + 0.6 * fg + 0.5 * bg;
      const blend = Math.min(1, bg / (fg + bg + 0.001));
      const cr = Math.round(57 + (188 - 57) * blend);
      const cg = Math.round(210 + (140 - 210) * blend);
      const cb = Math.round(192 + (255 - 192) * blend);

      ctx.beginPath();
      ctx.arc(n.x, n.y, nodeR, 0, Math.PI * 2);
      ctx.fillStyle = fg + bg > 0.02 ? `rgba(${cr},${cg},${cb},${Math.min(1, alpha)})` : 'rgba(57,210,192,0.15)';
      ctx.fill();
    }

    /* ── Draw traveling signals ── */
    const sigR = nodeR * 1.2;
    for (const sig of fwdSignals) {
      if (sig.delay > 0 || sig.segment >= sig.path.length - 1) continue;
      const from = nodes[sig.path[sig.segment]], to = nodes[sig.path[sig.segment + 1]];
      const x = from.x + (to.x - from.x) * sig.t;
      const y = from.y + (to.y - from.y) * sig.t;
      glow(x, y, sigR * 4, 'rgba(57,210,192,0.5)');
      ctx.beginPath(); ctx.arc(x, y, sigR, 0, Math.PI * 2);
      ctx.fillStyle = T.cyan; ctx.fill();
    }
    for (const sig of bwdSignals) {
      if (sig.delay > 0 || sig.segment >= sig.path.length - 1) continue;
      const from = nodes[sig.path[sig.segment]], to = nodes[sig.path[sig.segment + 1]];
      const x = from.x + (to.x - from.x) * sig.t;
      const y = from.y + (to.y - from.y) * sig.t;
      glow(x, y, sigR * 4, 'rgba(188,140,255,0.5)');
      ctx.beginPath(); ctx.arc(x, y, sigR, 0, Math.PI * 2);
      ctx.fillStyle = T.purple; ctx.fill();
    }

    /* ══════════════════════════════════════
       OUTPUT PANEL — Target vs Prediction curve
       ══════════════════════════════════════ */
    const opPad = 12 * s;
    const opW = W - opPad * 2;
    const opH = H * 0.32;
    const opX = opPad;
    const opY = H - opH - opPad;

    // Panel background
    ctx.fillStyle = T.surface; ctx.globalAlpha = 0.88;
    ctx.beginPath(); ctx.roundRect(opX, opY, opW, opH, 6 * s); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = T.border; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(opX, opY, opW, opH, 6 * s); ctx.stroke();

    // Panel header
    ctx.font = `600 ${Math.max(8, 9 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText('NETWORK OUTPUT', opX + 10 * s, opY + 14 * s);

    // Legend (right side of header)
    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.textAlign = 'right';
    ctx.fillStyle = T.blue;
    ctx.fillText('— TARGET', opX + opW - 10 * s, opY + 14 * s);
    const tgtLegW = ctx.measureText('— TARGET').width;
    ctx.fillStyle = T.cyan;
    ctx.fillText('— PREDICTED', opX + opW - 10 * s - tgtLegW - 14 * s, opY + 14 * s);

    // Graph area inside panel
    const gPadL = 10 * s, gPadR = 10 * s, gPadT = 22 * s, gPadB = 18 * s;
    const gX = opX + gPadL;
    const gY = opY + gPadT;
    const gW = opW - gPadL - gPadR;
    const gH = opH - gPadT - gPadB;
    const gMidY = gY + gH / 2;
    const gAmp = gH * 0.42;

    // Subtle grid lines
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5;
    ctx.globalAlpha = 0.3;
    for (let i = 0; i <= 4; i++) {
      const gy2 = gY + (gH * i / 4);
      ctx.beginPath(); ctx.moveTo(gX, gy2); ctx.lineTo(gX + gW, gy2); ctx.stroke();
    }
    if (!mobile) {
      for (let i = 0; i <= 8; i++) {
        const gx2 = gX + (gW * i / 8);
        ctx.beginPath(); ctx.moveTo(gx2, gY); ctx.lineTo(gx2, gY + gH); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Zero line
    ctx.strokeStyle = T.borderLight; ctx.lineWidth = 0.5;
    ctx.setLineDash([4 * s, 4 * s]);
    ctx.beginPath(); ctx.moveTo(gX, gMidY); ctx.lineTo(gX + gW, gMidY); ctx.stroke();
    ctx.setLineDash([]);

    // Draw TARGET curve (blue, thin, always visible)
    ctx.beginPath();
    ctx.strokeStyle = T.blue; ctx.lineWidth = 1.5 * s;
    ctx.lineJoin = 'round'; ctx.lineCap = 'round';
    for (let i = 0; i < NUM_PTS; i++) {
      const px = gX + (i / (NUM_PTS - 1)) * gW;
      const x = (i / (NUM_PTS - 1)) * Math.PI * 2;
      const py = gMidY - targetFn(x) * gAmp;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Draw PREDICTED curve (cyan, thicker, animated)
    ctx.beginPath();
    ctx.strokeStyle = T.cyan; ctx.lineWidth = 2.2 * s;
    for (let i = 0; i < NUM_PTS; i++) {
      const px = gX + (i / (NUM_PTS - 1)) * gW;
      const py = gMidY - predictedDisplay[i] * gAmp;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    ctx.stroke();

    // Glow on predicted curve
    if (!mobile) {
      ctx.beginPath();
      ctx.strokeStyle = T.cyanGlow; ctx.lineWidth = 6 * s;
      ctx.globalAlpha = 0.15;
      for (let i = 0; i < NUM_PTS; i++) {
        const px = gX + (i / (NUM_PTS - 1)) * gW;
        const py = gMidY - predictedDisplay[i] * gAmp;
        if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    // Error shading between target and predicted (red-tinted)
    ctx.beginPath();
    for (let i = 0; i < NUM_PTS; i++) {
      const px = gX + (i / (NUM_PTS - 1)) * gW;
      const x = (i / (NUM_PTS - 1)) * Math.PI * 2;
      const py = gMidY - targetFn(x) * gAmp;
      if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
    }
    for (let i = NUM_PTS - 1; i >= 0; i--) {
      const px = gX + (i / (NUM_PTS - 1)) * gW;
      const py = gMidY - predictedDisplay[i] * gAmp;
      ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fillStyle = T.redGlow;
    ctx.globalAlpha = 0.12;
    ctx.fill();
    ctx.globalAlpha = 1;

    // MSE value in the graph
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.red; ctx.textAlign = 'left';
    ctx.fillText(`MSE: ${currentLoss.toFixed(4)}`, gX + 4 * s, gY + gH + 12 * s);

    // Accuracy percentage
    const maxMSE = 2.5;
    const accuracy = Math.max(0, Math.min(100, (1 - currentLoss / maxMSE) * 100));
    ctx.fillStyle = accuracy > 90 ? T.green : accuracy > 60 ? T.amber : T.red;
    ctx.textAlign = 'right';
    ctx.fillText(`FIT: ${accuracy.toFixed(1)}%`, gX + gW - 4 * s, gY + gH + 12 * s);

    /* ══════════════════════════════════════
       PHASE BADGE — top center
       ══════════════════════════════════════ */
    const phaseLabels = {
      forward: '→ FORWARD PASS',
      loss: '◆ COMPUTE LOSS',
      backward: '← BACKWARD PASS',
      update: '↻ UPDATE WEIGHTS',
      pause: '… NEXT EPOCH',
    };
    const phaseColors = {
      forward: T.cyan, loss: T.red, backward: T.purple, update: T.green, pause: T.textMut,
    };
    const badgeText = phaseLabels[phase];
    ctx.font = `600 ${Math.max(9, 11 * s)}px 'IBM Plex Mono', monospace`;
    const tw = ctx.measureText(badgeText).width;
    const badgeW = tw + 20 * s;
    const badgeH = 22 * s;
    const badgeX = (W - badgeW) / 2;
    const badgeY = 8 * s;

    ctx.fillStyle = T.surface; ctx.globalAlpha = 0.9;
    ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 4 * s); ctx.fill();
    ctx.globalAlpha = 1;
    ctx.strokeStyle = phaseColors[phase]; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.roundRect(badgeX, badgeY, badgeW, badgeH, 4 * s); ctx.stroke();
    ctx.fillStyle = phaseColors[phase]; ctx.textAlign = 'center';
    ctx.fillText(badgeText, W / 2, badgeY + 15 * s);

    /* ══════════════════════════════════════
       HUD — status, epoch, legend
       ══════════════════════════════════════ */
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText('BACKPROPAGATION', 28 * s, 18 * s);
    const dotOn = Math.sin(t * 4) > 0;
    ctx.beginPath(); ctx.arc(14 * s, 15 * s, Math.max(3, 4 * s), 0, Math.PI * 2);
    ctx.fillStyle = dotOn ? T.green : T.textMut; ctx.fill();

    // Epoch
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText(`EPOCH ${epoch}`, 14 * s, 46 * s);

    requestAnimationFrame(draw);
  }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
