<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Audio Processing Pipeline — Speech2Text</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0d1117;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
(() => {
  /* ── Design Tokens ── */
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.3)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.3)',
    red: '#f85149',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  // --- Color override via postMessage ---
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);T.cyanDim=_rgba(c.cyan,0.08);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);T.greenDim=_rgba(c.green,0.08);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);T.amberDim=_rgba(c.amber,0.08);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);T.purpleDim=_rgba(c.purple,0.08);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });
  const mobile = window.innerWidth < 600;

  /* ── Canvas setup ── */
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H, dpr;

  function resize() {
    dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const rect = canvas.getBoundingClientRect();
    W = rect.width; H = rect.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function S(w) { return Math.max(0.45, w / 600); }
  function colorWithAlpha(c, a) {
    if (c.startsWith('#')) {
      const r = parseInt(c.slice(1,3),16), g = parseInt(c.slice(3,5),16), b = parseInt(c.slice(5,7),16);
      return `rgba(${r},${g},${b},${a})`;
    }
    return c.replace(/[\d.]+\)$/, `${a})`);
  }
  function drawGrid(w, h) {
    const s = S(w);
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5; ctx.globalAlpha = mobile ? 0.3 : 0.5;
    const sp = (mobile ? 60 : 40) * Math.max(0.6, s);
    if (!mobile) { for (let x = 0; x < w; x += sp) { ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); } }
    for (let y = 0; y < h; y += sp) { ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
    ctx.globalAlpha = 1;
  }
  function drawGlow(x, y, radius, color) {
    if (mobile) radius *= 0.7;
    const g = ctx.createRadialGradient(x, y, 0, x, y, radius);
    g.addColorStop(0, color); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI * 2); ctx.fill();
  }
  function drawLabel(text, x, y, color, size) {
    const fs = mobile ? Math.max(11, size) : size;
    ctx.font = `500 ${fs}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = color; ctx.textAlign = 'center'; ctx.fillText(text, x, y);
  }
  function applyShadow(color, blur) {
    if (mobile) { ctx.shadowBlur = 0; return; }
    ctx.shadowColor = color; ctx.shadowBlur = blur;
  }

  /* ── Pipeline stages ── */
  const STAGES = mobile
    ? [
        { label: 'AUDIO',    icon: 'wave',  color: T.cyan },
        { label: 'FFT',      icon: 'bars',  color: T.blue },
        { label: 'ENCODER',  icon: 'grid',  color: T.purple },
        { label: 'TEXT',     icon: 'text',  color: T.green },
      ]
    : [
        { label: 'AUDIO IN', icon: 'wave',  color: T.cyan },
        { label: 'FFT',      icon: 'bars',  color: T.blue },
        { label: 'ENCODER',  icon: 'grid',  color: T.purple },
        { label: 'DECODER',  icon: 'nodes', color: T.amber },
        { label: 'TEXT OUT',  icon: 'text',  color: T.green },
      ];

  /* ── Particles flowing between stages ── */
  let particles = [];
  let lastSpawn = 0;
  const maxParticles = mobile ? 30 : 60;

  /* ── Output text animation ── */
  const OUTPUT_WORDS = mobile
    ? ['Speech', 'to', 'text', 'via', 'AI']
    : ['Transforming', 'speech', 'to', 'text', 'with', 'neural', 'networks'];

  /* ── Main draw ── */
  let startTime = null;

  function draw(ts) {
    if (startTime === null) startTime = ts;
    const t = (ts - startTime) / 1000;
    ctx.clearRect(0, 0, W, H);
    drawGrid(W, H);
    const s = S(W);

    const cycleDur = 10;
    const cycleT = (t % cycleDur) / cycleDur;

    /* Intensity envelope */
    let intensity;
    if (cycleT < 0.08) intensity = cycleT / 0.08;
    else if (cycleT < 0.75) intensity = 0.7 + 0.3 * Math.sin(cycleT * 12);
    else if (cycleT < 0.88) intensity = 1 - (cycleT - 0.75) / 0.13;
    else intensity = 0.05;

    /* ── Layout ── */
    const boxW = Math.max(40, 52 * s);
    const boxH = Math.max(40, 52 * s);
    const hPad = mobile ? boxW / 2 + 8 * s : 30 * s;
    const pad = { top: 36 * s, bottom: 65 * s, left: hPad, right: hPad };
    const stageCount = STAGES.length;
    const pipelineW = W - pad.left - pad.right;
    const stageSpacing = pipelineW / (stageCount - 1);
    const stageY = pad.top + (H - pad.top - pad.bottom) * 0.35;

    /* Stage positions */
    const stagePositions = STAGES.map((_, i) => ({
      x: pad.left + i * stageSpacing,
      y: stageY,
    }));

    /* ── Draw connection lines ── */
    for (let i = 0; i < stageCount - 1; i++) {
      const p1 = stagePositions[i];
      const p2 = stagePositions[i + 1];

      // Progress: stage activates sequentially
      const stageProgress = Math.max(0, Math.min(1, (cycleT - 0.05 - i * 0.12) / 0.1));
      const lineAlpha = 0.15 + stageProgress * 0.25;

      ctx.strokeStyle = colorWithAlpha(T.borderLight, lineAlpha);
      ctx.lineWidth = 1.5 * s;
      ctx.beginPath();
      ctx.moveTo(p1.x + boxW / 2 + 4 * s, p1.y);
      ctx.lineTo(p2.x - boxW / 2 - 4 * s, p2.y);
      ctx.stroke();

      // Arrow head
      const ax = p2.x - boxW / 2 - 4 * s;
      const arrowSize = 4 * s;
      ctx.fillStyle = colorWithAlpha(T.borderLight, lineAlpha);
      ctx.beginPath();
      ctx.moveTo(ax, p2.y - arrowSize);
      ctx.lineTo(ax + arrowSize, p2.y);
      ctx.lineTo(ax, p2.y + arrowSize);
      ctx.closePath();
      ctx.fill();
    }

    /* ── Spawn particles ── */
    if (t - lastSpawn > (mobile ? 0.25 : 0.15) && intensity > 0.2) {
      lastSpawn = t;
      particles.push({
        stage: 0,
        progress: 0,
        speed: 0.6 + Math.random() * 0.5,
        yOff: (Math.random() - 0.5) * 12 * s,
      });
    }

    /* ── Update & draw particles ── */
    const newParticles = [];
    for (const p of particles) {
      p.progress += p.speed * 0.016;
      if (p.progress >= 1) {
        // Move to next stage
        if (p.stage + 1 < stageCount - 1) {
          newParticles.push({
            stage: p.stage + 1,
            progress: 0,
            speed: 0.6 + Math.random() * 0.5,
            yOff: (Math.random() - 0.5) * 10 * s,
          });
        }
      } else {
        newParticles.push(p);
        const src = stagePositions[p.stage];
        const tgt = stagePositions[p.stage + 1];
        const px = src.x + (tgt.x - src.x) * p.progress;
        const py = src.y + (tgt.y - src.y) * p.progress + p.yOff * Math.sin(p.progress * Math.PI);
        const c = STAGES[p.stage].color;

        drawGlow(px, py, 8 * s, colorWithAlpha(c, 0.3));
        ctx.beginPath();
        ctx.arc(px, py, Math.max(1.5, 2 * s), 0, Math.PI * 2);
        ctx.fillStyle = c;
        ctx.fill();
      }
    }
    particles = newParticles.slice(-maxParticles);

    /* ── Draw stage boxes ── */
    for (let i = 0; i < stageCount; i++) {
      const stage = STAGES[i];
      const pos = stagePositions[i];
      const stageActive = cycleT > 0.05 + i * 0.12;
      const activeAlpha = stageActive ? Math.min(1, (cycleT - 0.05 - i * 0.12) / 0.08) : 0.3;

      const bx = pos.x - boxW / 2;
      const by = pos.y - boxH / 2;

      // Box background
      ctx.fillStyle = T.surface;
      ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.roundRect(bx, by, boxW, boxH, 6 * s); ctx.fill();
      ctx.globalAlpha = 1;

      // Box border
      ctx.strokeStyle = colorWithAlpha(stage.color, 0.3 + activeAlpha * 0.5);
      ctx.lineWidth = 1.5 * s;
      ctx.beginPath(); ctx.roundRect(bx, by, boxW, boxH, 6 * s); ctx.stroke();

      // Glow when active
      if (stageActive && intensity > 0.3) {
        drawGlow(pos.x, pos.y, boxW * 0.8, colorWithAlpha(stage.color, 0.1 * intensity));
      }

      /* ── Icon inside box ── */
      const iconSize = boxW * 0.55;
      const ix = pos.x;
      const iy = pos.y;

      ctx.globalAlpha = 0.3 + activeAlpha * 0.7;

      if (stage.icon === 'wave') {
        // Mini waveform
        ctx.beginPath();
        ctx.strokeStyle = stage.color;
        ctx.lineWidth = 1.2 * s;
        for (let px = -iconSize/2; px <= iconSize/2; px += 2) {
          const nx = (px + iconSize/2) / iconSize;
          const amp = Math.sin(nx * Math.PI) * iconSize * 0.35 * intensity;
          const yy = iy + Math.sin(nx * Math.PI * 3 + t * 3) * amp;
          if (px === -iconSize/2) ctx.moveTo(ix + px, yy);
          else ctx.lineTo(ix + px, yy);
        }
        ctx.stroke();
      }
      else if (stage.icon === 'bars') {
        // Frequency bars
        const barCount = 7;
        const barW = iconSize / (barCount * 1.8);
        for (let b = 0; b < barCount; b++) {
          const bx2 = ix - iconSize/2 + (b / (barCount - 1)) * iconSize - barW/2;
          const barH = (0.3 + 0.7 * Math.abs(Math.sin(t * 2.5 + b * 0.8))) * iconSize * 0.7 * intensity;
          ctx.fillStyle = colorWithAlpha(stage.color, 0.5 + activeAlpha * 0.3);
          ctx.fillRect(bx2, iy + iconSize * 0.35 - barH, barW, barH);
        }
      }
      else if (stage.icon === 'grid') {
        // Embedding grid
        const gSize = 4;
        const cellW = iconSize / (gSize + 1);
        for (let gx = 0; gx < gSize; gx++) {
          for (let gy = 0; gy < gSize; gy++) {
            const cx = ix - iconSize/2 + (gx + 0.5) * (iconSize / gSize) + cellW * 0.2;
            const cy = iy - iconSize/2 + (gy + 0.5) * (iconSize / gSize) + cellW * 0.2;
            const val = Math.sin(t * 1.5 + gx * 1.3 + gy * 0.7) * 0.5 + 0.5;
            ctx.fillStyle = colorWithAlpha(stage.color, val * activeAlpha * intensity);
            ctx.fillRect(cx - cellW * 0.35, cy - cellW * 0.35, cellW * 0.7, cellW * 0.7);
          }
        }
      }
      else if (stage.icon === 'nodes') {
        // Decoder attention dots
        const nodeCount = 5;
        for (let n = 0; n < nodeCount; n++) {
          const angle = (n / nodeCount) * Math.PI * 2 + t * 0.5;
          const nr = iconSize * 0.32;
          const nx = ix + Math.cos(angle) * nr;
          const ny = iy + Math.sin(angle) * nr;
          const r = 2 * s + Math.sin(t * 3 + n) * 1 * s;
          ctx.beginPath(); ctx.arc(nx, ny, r, 0, Math.PI * 2);
          ctx.fillStyle = colorWithAlpha(stage.color, 0.4 + activeAlpha * 0.4);
          ctx.fill();
          // Connection to center
          ctx.strokeStyle = colorWithAlpha(stage.color, 0.15 * activeAlpha);
          ctx.lineWidth = 0.8 * s;
          ctx.beginPath(); ctx.moveTo(ix, iy); ctx.lineTo(nx, ny); ctx.stroke();
        }
        // Center dot
        ctx.beginPath(); ctx.arc(ix, iy, 2.5 * s, 0, Math.PI * 2);
        ctx.fillStyle = stage.color; ctx.fill();
      }
      else if (stage.icon === 'text') {
        // Text output lines
        const lineCount = 3;
        for (let l = 0; l < lineCount; l++) {
          const lx = ix - iconSize * 0.4;
          const ly = iy - iconSize * 0.25 + l * iconSize * 0.25;
          const lw = iconSize * (0.5 + 0.3 * Math.sin(t + l * 2)) * activeAlpha;
          ctx.fillStyle = colorWithAlpha(stage.color, 0.3 + activeAlpha * 0.4);
          ctx.beginPath(); ctx.roundRect(lx, ly, lw, 2.5 * s, 1); ctx.fill();
        }
      }
      ctx.globalAlpha = 1;

      // Stage label below box
      const lblFs = Math.max(7, 8 * s);
      drawLabel(stage.label, pos.x, pos.y + boxH / 2 + 14 * s, colorWithAlpha(stage.color, 0.5 + activeAlpha * 0.5), lblFs);
    }

    /* ── Output text at bottom ── */
    const textY = H - pad.bottom + 20 * s;
    const textFs = Math.max(10, 14 * s);
    const mono = "'IBM Plex Mono', monospace";
    ctx.font = `400 ${textFs}px ${mono}`;
    ctx.textAlign = 'center';

    // Words appear progressively as pipeline processes
    const textProgress = Math.max(0, Math.min(1, (cycleT - 0.35) / 0.45));
    const visibleWords = Math.floor(textProgress * OUTPUT_WORDS.length);

    if (visibleWords > 0) {
      const displayText = OUTPUT_WORDS.slice(0, visibleWords).join(' ');
      const totalW = ctx.measureText(displayText).width;
      let cx = (W - totalW) / 2;
      ctx.textAlign = 'left';

      for (let i = 0; i < visibleWords; i++) {
        const word = OUTPUT_WORDS[i];
        const isCurrent = i === visibleWords - 1;
        const ww = ctx.measureText(word + ' ').width;

        ctx.fillStyle = isCurrent ? T.text : T.textSec;
        if (isCurrent && !mobile) {
          applyShadow(T.greenGlow, 6 * s);
        }
        ctx.fillText(word, cx, textY);
        ctx.shadowBlur = 0;
        cx += ww;
      }

      // Blinking cursor
      if (cycleT < 0.85) {
        const blink = Math.sin(t * 6) > 0;
        if (blink) {
          ctx.fillStyle = T.green;
          ctx.fillRect(cx + 2 * s, textY - textFs * 0.75, 2 * s, textFs);
        }
      }
    }

    // Placeholder text for not-yet-visible words
    if (visibleWords < OUTPUT_WORDS.length && cycleT > 0.3) {
      const remaining = OUTPUT_WORDS.slice(visibleWords).join(' ');
      ctx.textAlign = 'left';
      const allText = OUTPUT_WORDS.join(' ');
      const allW = ctx.measureText(allText).width;
      const visText = OUTPUT_WORDS.slice(0, visibleWords).join(' ') + (visibleWords > 0 ? ' ' : '');
      const visW = ctx.measureText(visText).width;
      const startX = (W - allW) / 2 + visW;
      ctx.globalAlpha = 0.12;
      ctx.fillStyle = T.textMut;
      ctx.fillText(remaining, startX, textY);
      ctx.globalAlpha = 1;
    }

    /* ── Latency / throughput metrics ── */
    const metricY = Math.min(textY + 20 * s, H - 6 * s);
    const metricFs = Math.max(6, 7 * s);
    if (intensity > 0.3 && metricY < H - 4 * s) {
      const latency = (45 + Math.sin(t * 2.3) * 8).toFixed(0);
      const rtf = (0.12 + Math.sin(t * 1.7) * 0.03).toFixed(2);
      ctx.textAlign = 'center';
      ctx.font = `400 ${metricFs}px ${mono}`;
      ctx.fillStyle = T.textMut;
      const metricText = mobile ? `${latency}ms · ${rtf}x` : `latency: ${latency}ms  ·  RTF: ${rtf}x`;
      ctx.fillText(metricText, W / 2, metricY);
    }

    /* ── Status label & activity dot ── */
    const statusFs = Math.max(7, 9 * s);
    const statusText = mobile ? 'ASR — WHISPER' : 'ASR PIPELINE — WHISPER';
    drawLabel(statusText, 68 * s + 16, 14 * s, T.textMut, statusFs);
    const dotR = Math.max(3, 3.5 * s);
    const dotColor = intensity > 0.5 ? T.green : (intensity > 0.1 ? T.amber : T.textMut);
    ctx.beginPath(); ctx.arc(14 * s, 10 * s, dotR, 0, Math.PI * 2);
    ctx.fillStyle = dotColor; ctx.fill();

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
