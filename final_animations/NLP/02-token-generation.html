<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chatbot — Token Generation</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090d;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'IBM Plex Mono', -apple-system, monospace;
  }
  .wrap { width: 94vw; max-width: 900px; }
  canvas { display: block; width: 100%; height: 420px; border-radius: 8px; background: #0d1117; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 2px; color: #484f58; font-size: 10px; letter-spacing: 0.1em;
  }
  .meta span { color: #58a6ff; }
  @media (max-width: 600px) { canvas { height: 340px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrap">
  <div class="meta">
    <div>CHATBOT <span>/ TOKEN GENERATION</span></div>
    <div></div>
  </div>
  <canvas id="c"></canvas>
</div>

<script>
(() => {
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)', blueDim: 'rgba(88,166,255,0.08)',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)', cyanDim: 'rgba(57,210,192,0.08)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.35)', purpleDim: 'rgba(188,140,255,0.08)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.35)',
    red: '#f85149',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  // --- Color override via postMessage ---
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);T.cyanDim=_rgba(c.cyan,0.08);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);T.greenDim=_rgba(c.green,0.08);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);T.amberDim=_rgba(c.amber,0.08);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);T.purpleDim=_rgba(c.purple,0.08);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });

  let mobile = window.innerWidth < 600;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    mobile = window.innerWidth < 600;
    const dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function S(w) { return Math.max(0.45, w / 600); }
  function shadow(c, b) { if (!mobile) { ctx.shadowColor = c; ctx.shadowBlur = b; } }
  function drawGlow(x, y, r, c) {
    if (mobile) r *= 0.6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  function colorAlpha(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ── Token data ── */
  const responses = [
    'The neural network processes input through multiple layers of weighted connections, each applying non-linear transformations to extract hierarchical features.',
    'Reinforcement learning agents maximize cumulative reward by exploring an environment and learning optimal policies through trial and error feedback loops.',
    'Large language models predict the next token based on context, using attention mechanisms to weigh the relevance of each preceding token in the sequence.',
  ];

  // Probability distributions for top tokens (simulated)
  function generateTokenProbs(tokenIdx) {
    const probs = [];
    const labels = ['▸ selected', 'alt_1', 'alt_2', 'alt_3', 'alt_4'];
    let remaining = 1.0;
    for (let i = 0; i < 5; i++) {
      const p = i === 0
        ? 0.35 + Math.sin(tokenIdx * 1.7) * 0.25 + Math.random() * 0.15
        : remaining * (0.3 + Math.random() * 0.4);
      const clamped = Math.min(remaining, Math.max(0.02, p));
      probs.push({ label: labels[i], prob: clamped });
      remaining -= clamped;
    }
    // Normalize
    const sum = probs.reduce((a, b) => a + b.prob, 0);
    probs.forEach(p => p.prob /= sum);
    return probs.sort((a, b) => b.prob - a.prob);
  }

  const cycleDur = 12;

  // Particles emitted when a token appears
  let particles = [];

  function draw(ts) {
    if (!draw.start) draw.start = ts;
    const t = (ts - draw.start) / 1000;
    const s = S(W);
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5;
    ctx.globalAlpha = mobile ? 0.2 : 0.35;
    const gsp = 40 * s;
    for (let y = 0; y <= H; y += gsp) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    if (!mobile) {
      for (let x = 0; x <= W; x += gsp) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    const respIdx = Math.floor(t / cycleDur) % responses.length;
    const response = responses[respIdx];
    const tokens = response.split(' ');
    const cycleT = (t % cycleDur) / cycleDur;

    const padX = 24 * s;
    const padY = 40 * s;
    const fontSize = Math.max(9, 12 * s);
    const lineH = 22 * s;

    // Token generation phase: 0.05 → 0.80 of cycle
    const genStart = 0.05, genEnd = 0.80;
    const genProgress = Math.max(0, Math.min(1, (cycleT - genStart) / (genEnd - genStart)));
    const totalTokens = tokens.length;
    const visibleTokens = Math.floor(genProgress * totalTokens);
    const currentTokenFrac = (genProgress * totalTokens) % 1;

    // ── Draw generated text ──
    ctx.font = `400 ${fontSize}px 'IBM Plex Mono', monospace`;
    ctx.textAlign = 'left';
    ctx.textBaseline = 'top';

    let curX = padX;
    let curY = padY;
    const maxLineW = W - padX * 2;

    for (let i = 0; i <= visibleTokens && i < totalTokens; i++) {
      const token = tokens[i];
      const tokenW = ctx.measureText(token + ' ').width;

      // Wrap
      if (curX + tokenW > padX + maxLineW) {
        curX = padX;
        curY += lineH;
      }

      const isCurrent = i === visibleTokens;
      const isRevealing = isCurrent && visibleTokens < totalTokens;

      if (isCurrent && isRevealing) {
        // Partially revealed current token
        const charCount = Math.floor(currentTokenFrac * token.length);
        const partial = token.substring(0, charCount);

        // Glow at cursor position
        drawGlow(curX + ctx.measureText(partial).width, curY + lineH / 2, 20 * s, T.cyanGlow);

        ctx.fillStyle = T.cyan;
        shadow(T.cyanGlow, 6 * s);
        ctx.fillText(partial, curX, curY);
        ctx.shadowBlur = 0;

        // Blinking cursor
        if (Math.sin(t * 12) > 0) {
          const cursorX = curX + ctx.measureText(partial).width;
          ctx.fillStyle = T.cyan;
          ctx.fillRect(cursorX, curY + 1 * s, 2 * s, fontSize);
        }
      } else if (!isCurrent) {
        // Fully revealed token — recent ones are brighter
        const age = visibleTokens - i;
        const brightness = age < 3 ? 1 : Math.max(0.5, 1 - (age - 3) * 0.03);
        ctx.fillStyle = colorAlpha(T.text, brightness);
        ctx.fillText(token + ' ', curX, curY);
      }

      curX += tokenW;
    }

    // ── Probability distribution panel ──
    if (visibleTokens > 0 && visibleTokens <= totalTokens) {
      const panelW = mobile ? 140 * s : 180 * s;
      const panelH = 110 * s;
      const panelX = W - padX - panelW;
      const panelY = H - padY - panelH - 10 * s;

      // Panel background
      ctx.fillStyle = T.surface;
      ctx.globalAlpha = 0.9;
      ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 6 * s); ctx.fill();
      ctx.globalAlpha = 1;
      ctx.strokeStyle = T.border; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(panelX, panelY, panelW, panelH, 6 * s); ctx.stroke();

      // Panel title
      const panelFontSm = Math.max(7, 8 * s);
      ctx.font = `500 ${panelFontSm}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
      ctx.fillText('TOKEN PROBABILITIES', panelX + 8 * s, panelY + 12 * s);

      // Probability bars
      const probs = generateTokenProbs(visibleTokens);
      const barStartX = panelX + 8 * s;
      const barMaxW = panelW - 16 * s;
      const barH = 8 * s;
      const barGap = 16 * s;

      for (let i = 0; i < Math.min(5, probs.length); i++) {
        const by = panelY + 22 * s + i * barGap;
        const bw = probs[i].prob * barMaxW;
        const isTop = i === 0;
        const barColor = isTop ? T.cyan : T.blue;
        const barGlowColor = isTop ? T.cyanGlow : T.blueGlow;

        // Bar background
        ctx.fillStyle = colorAlpha(T.border, 0.3);
        ctx.fillRect(barStartX, by, barMaxW, barH);

        // Bar fill
        ctx.fillStyle = colorAlpha(barColor, isTop ? 0.8 : 0.4);
        ctx.fillRect(barStartX, by, bw, barH);

        if (isTop && !mobile) {
          shadow(barGlowColor, 4 * s);
          ctx.fillRect(barStartX, by, bw, barH);
          ctx.shadowBlur = 0;
        }

        // Probability label
        ctx.font = `400 ${Math.max(6, 7 * s)}px 'IBM Plex Mono', monospace`;
        ctx.fillStyle = isTop ? T.cyan : T.textMut;
        ctx.textAlign = 'right';
        ctx.fillText(`${(probs[i].prob * 100).toFixed(0)}%`, barStartX + barMaxW, by - 2 * s);
      }
    }

    // ── Speed indicator — tokens/sec ──
    const elapsedGen = Math.max(0.01, (cycleT - genStart) * cycleDur);
    const rawTokPerSec = genProgress > 0 ? visibleTokens / elapsedGen : 0;
    // Display a realistic LLM-like speed (30-60 tok/s range)
    const displaySpeed = genProgress > 0 ? (28 + rawTokPerSec * 3 + Math.sin(t * 2.5) * 5).toFixed(1) : '0.0';
    const speedBarW = 80 * s;
    const speedBarH = 3 * s;
    const speedX = padX;
    const speedY = H - 20 * s;

    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText(`${displaySpeed} tok/s`, speedX, speedY - 8 * s);

    ctx.fillStyle = T.border;
    ctx.fillRect(speedX, speedY, speedBarW, speedBarH);
    const speedFill = Math.min(1, parseFloat(displaySpeed) / 60);
    ctx.fillStyle = T.cyan;
    ctx.fillRect(speedX, speedY, speedBarW * speedFill, speedBarH);

    // ── Token counter ──
    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText(`TOKENS: ${visibleTokens}/${totalTokens}`, speedX + speedBarW + 12 * s, speedY - 6 * s);

    // Fade out near end
    if (cycleT > 0.88) {
      const fadeOut = (cycleT - 0.88) / 0.12;
      ctx.fillStyle = colorAlpha(T.void, fadeOut);
      ctx.fillRect(0, 0, W, H);
    }

    // Status label top-left
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText('TOKEN GENERATION', 28 * s, 18 * s);
    const dotOn = Math.sin(t * 4) > 0;
    ctx.beginPath(); ctx.arc(14 * s, 15 * s, Math.max(3, 4 * s), 0, Math.PI * 2);
    ctx.fillStyle = dotOn ? T.green : T.textMut; ctx.fill();

    // Generation phase indicator top-right
    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = cycleT < genEnd ? T.cyan : T.green;
    ctx.textAlign = 'right';
    ctx.fillText(cycleT < genStart ? 'IDLE' : cycleT < genEnd ? 'GENERATING' : 'COMPLETE', W - 10 * s, 18 * s);

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
