<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RAG — Retrieval-Augmented Generation</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #08090d;
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; overflow: hidden;
    font-family: 'IBM Plex Mono', -apple-system, monospace;
  }
  .wrap { width: 94vw; max-width: 900px; }
  canvas { display: block; width: 100%; height: 520px; border-radius: 8px; background: #0d1117; }
  .meta {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 2px; color: #484f58; font-size: 10px; letter-spacing: 0.1em;
  }
  .meta span { color: #58a6ff; }
  @media (max-width: 600px) { canvas { height: 420px; } }
</style>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>

<div class="wrap">
  <div class="meta">
    <div>KNOWLEDGE <span>/ RAG PIPELINE</span></div>
    <div></div>
  </div>
  <canvas id="c"></canvas>
</div>

<script>
(() => {
  const T = {
    void: '#08090d', bg: '#0d1117', surface: '#161b22',
    border: '#21262d', borderLight: '#30363d',
    blue: '#58a6ff', blueGlow: 'rgba(88,166,255,0.35)',
    cyan: '#39d2c0', cyanGlow: 'rgba(57,210,192,0.35)',
    green: '#3fb950', greenGlow: 'rgba(63,185,80,0.3)',
    purple: '#bc8cff', purpleGlow: 'rgba(188,140,255,0.35)',
    amber: '#d29922', amberGlow: 'rgba(210,153,34,0.3)',
    red: '#f85149',
    text: '#e6edf3', textSec: '#8b949e', textMut: '#484f58',
  };
  // --- Color override via postMessage ---
  function _hexToRgb(h){h=h.replace("#","");return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
  function _rgba(hex,a){const[r,g,b]=_hexToRgb(hex);return "rgba("+r+","+g+","+b+","+a+")";}
  window.addEventListener("message",function(e){
    if(e.data&&e.data.type==="theme"){
      var c=e.data.colors;
      if(c.blue){T.blue=c.blue;T.blueGlow=_rgba(c.blue,0.35);T.blueDim=_rgba(c.blue,0.08);}
      if(c.cyan){T.cyan=c.cyan;T.cyanGlow=_rgba(c.cyan,0.35);T.cyanDim=_rgba(c.cyan,0.08);}
      if(c.green){T.green=c.green;T.greenGlow=_rgba(c.green,0.3);T.greenDim=_rgba(c.green,0.08);}
      if(c.red){T.red=c.red;T.redGlow=_rgba(c.red,0.4);}
      if(c.amber){T.amber=c.amber;T.amberGlow=_rgba(c.amber,0.3);T.amberDim=_rgba(c.amber,0.08);}
      if(c.purple){T.purple=c.purple;T.purpleGlow=_rgba(c.purple,0.3);T.purpleDim=_rgba(c.purple,0.08);}
      if(c.bg){T.bg=c.bg;var cv=document.querySelector("canvas");if(cv)cv.style.background=c.bg;}
      if(c.void){T.void=c.void;document.body.style.background=c.void;}
      if(c.surface)T.surface=c.surface;
      if(c.border)T.border=c.border;
      if(c.borderLight)T.borderLight=c.borderLight;
      if(c.text)T.text=c.text;
      if(c.textSec)T.textSec=c.textSec;
      if(c.textMut){T.textMut=c.textMut;var m=document.querySelector(".meta");if(m)m.style.color=c.textMut;}
    }
  });

  let mobile = window.innerWidth < 600;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    mobile = window.innerWidth < 600;
    const dpr = Math.min(window.devicePixelRatio || 1, mobile ? 2 : 3);
    const r = canvas.getBoundingClientRect();
    W = r.width; H = r.height;
    canvas.width = W * dpr; canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  function S(w) { return Math.max(0.45, w / 600); }
  function shadow(c, b) { if (!mobile) { ctx.shadowColor = c; ctx.shadowBlur = b; } }
  function drawGlow(x, y, r, c) {
    if (mobile) r *= 0.6;
    const g = ctx.createRadialGradient(x, y, 0, x, y, r);
    g.addColorStop(0, c); g.addColorStop(1, 'transparent');
    ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
  }
  function colorAlpha(hex, a) {
    if (hex.startsWith('rgba')) return hex.replace(/[\d.]+\)$/, `${a})`);
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }

  /* ═══════════════════════════════════════════
     RAG SCENARIOS
     Each has: query, retrieved chunks, generated answer
     ═══════════════════════════════════════════ */
  const SCENARIOS = [
    {
      query: 'What is our refund policy for enterprise clients?',
      chunks: [
        { title: 'policy_v3.pdf', score: 0.94, snippet: 'Enterprise clients may request full refund within 30 days...' },
        { title: 'faq_enterprise.md', score: 0.87, snippet: 'Refund requests are processed by the billing team within 5 days...' },
        { title: 'terms_of_service.txt', score: 0.72, snippet: 'All refunds are subject to usage verification and approval...' },
        { title: 'support_guide.md', score: 0.58, snippet: 'Contact support for refund-related inquiries...' },
      ],
      answer: 'Enterprise clients can request a full refund within 30 days. The billing team processes requests in 5 business days after usage verification.',
    },
    {
      query: 'How do I configure SSO with SAML 2.0?',
      chunks: [
        { title: 'sso_setup.md', score: 0.96, snippet: 'Navigate to Settings > Security > SAML Configuration...' },
        { title: 'auth_integration.pdf', score: 0.89, snippet: 'SAML 2.0 requires IdP metadata URL and certificate...' },
        { title: 'admin_guide.md', score: 0.74, snippet: 'SSO settings are managed by organization admins only...' },
        { title: 'changelog_v4.txt', score: 0.51, snippet: 'Added SAML 2.0 support in version 4.2...' },
      ],
      answer: 'Go to Settings > Security > SAML Configuration. You\'ll need your IdP metadata URL and signing certificate. Only org admins can modify SSO settings.',
    },
  ];

  const cycleDur = 16;

  /* Phases of the RAG pipeline within a cycle:
     0.00 - 0.12  Query appears (typing)
     0.12 - 0.18  Embedding (query → vector)
     0.18 - 0.50  Retrieval (searching vector store, chunks appear)
     0.50 - 0.58  Ranking / scoring
     0.58 - 0.85  Generation (answer streams in)
     0.85 - 1.00  Fade out
  */

  // Animated particles flowing between pipeline stages
  let flowParticles = [];

  function spawnFlowParticle(x1, y1, x2, y2, color) {
    flowParticles.push({
      x1, y1, x2, y2, color,
      birth: performance.now() / 1000,
      dur: 0.4 + Math.random() * 0.3,
      offset: (Math.random() - 0.5) * 8,
    });
  }

  function drawFlowParticles(t, s) {
    flowParticles = flowParticles.filter(p => t - p.birth < p.dur);
    for (const p of flowParticles) {
      const prog = (t - p.birth) / p.dur;
      const ease = prog < 0.5 ? 2 * prog * prog : 1 - Math.pow(-2 * prog + 2, 2) / 2;
      const x = p.x1 + (p.x2 - p.x1) * ease;
      const y = p.y1 + (p.y2 - p.y1) * ease + p.offset * Math.sin(prog * Math.PI);
      const alpha = prog < 0.1 ? prog / 0.1 : prog > 0.8 ? (1 - prog) / 0.2 : 1;
      ctx.beginPath();
      ctx.arc(x, y, (2 + Math.sin(prog * Math.PI) * 2) * s, 0, Math.PI * 2);
      ctx.fillStyle = colorAlpha(p.color, alpha * 0.7);
      ctx.fill();
    }
  }

  /* ═══════════════════════════════════════════
     PIPELINE STAGE BOX
     ═══════════════════════════════════════════ */
  function drawStageBox(x, y, w, h, label, color, active, progress, t, s) {
    // Background
    ctx.fillStyle = active ? colorAlpha(color, 0.08) : T.surface;
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 4 * s); ctx.fill();

    // Border
    ctx.strokeStyle = active ? colorAlpha(color, 0.5 + 0.3 * Math.sin(t * 4)) : T.border;
    ctx.lineWidth = active ? 1.5 * s : 1;
    ctx.beginPath(); ctx.roundRect(x, y, w, h, 4 * s); ctx.stroke();

    // Active glow
    if (active && !mobile) {
      shadow(colorAlpha(color, 0.4), 10 * s);
      ctx.strokeStyle = colorAlpha(color, 0.3);
      ctx.beginPath(); ctx.roundRect(x, y, w, h, 4 * s); ctx.stroke();
      ctx.shadowBlur = 0;
    }

    // Label
    const fs = Math.max(7, 8 * s);
    ctx.font = `600 ${fs}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = active ? color : T.textMut;
    ctx.textAlign = 'center';
    ctx.fillText(label, x + w / 2, y + h / 2 + fs * 0.35);

    // Progress bar at bottom
    if (active && progress > 0) {
      const barH = 2 * s;
      const barY = y + h - barH - 2 * s;
      ctx.fillStyle = colorAlpha(color, 0.2);
      ctx.fillRect(x + 4 * s, barY, w - 8 * s, barH);
      ctx.fillStyle = color;
      ctx.fillRect(x + 4 * s, barY, (w - 8 * s) * Math.min(1, progress), barH);
    }
  }

  /* ═══════════════════════════════════════════
     VECTOR SPACE VISUALIZATION
     ═══════════════════════════════════════════ */
  function drawVectorSpace(cx, cy, radius, queryVec, chunks, retrievalProgress, t, s) {
    // Background circle
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fillStyle = colorAlpha(T.surface, 0.5);
    ctx.fill();
    ctx.strokeStyle = T.border;
    ctx.lineWidth = 1;
    ctx.stroke();

    // Label
    const fs = Math.max(6, 7 * s);
    ctx.font = `400 ${fs}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut;
    ctx.textAlign = 'center';
    ctx.fillText('VECTOR SPACE', cx, cy - radius - 6 * s);

    // Scatter dim dots for the "database"
    const dotCount = mobile ? 20 : 40;
    for (let i = 0; i < dotCount; i++) {
      const angle = (i / dotCount) * Math.PI * 2 + i * 2.39996;
      const dist = radius * (0.2 + (((i * 7 + 3) % 13) / 13) * 0.7);
      const dx = cx + Math.cos(angle) * dist;
      const dy = cy + Math.sin(angle) * dist;
      ctx.beginPath();
      ctx.arc(dx, dy, 1.5 * s, 0, Math.PI * 2);
      ctx.fillStyle = colorAlpha(T.borderLight, 0.4);
      ctx.fill();
    }

    // Query vector point (center-ish, pulsing)
    if (queryVec) {
      const qx = cx + 5 * s;
      const qy = cy - 3 * s;
      drawGlow(qx, qy, 18 * s, colorAlpha(T.cyan, 0.15));
      ctx.beginPath();
      ctx.arc(qx, qy, (3 + Math.sin(t * 3) * 1) * s, 0, Math.PI * 2);
      ctx.fillStyle = T.cyan;
      ctx.fill();

      // Chunk dots appearing with retrieval
      const visibleChunks = Math.floor(retrievalProgress * chunks.length);
      for (let i = 0; i < visibleChunks; i++) {
        const chunk = chunks[i];
        // Place chunks based on score — higher score = closer to query
        const cAngle = -Math.PI / 4 + i * (Math.PI / 2.5);
        const cDist = radius * (0.15 + (1 - chunk.score) * 0.6);
        const cdx = cx + Math.cos(cAngle) * cDist;
        const cdy = cy + Math.sin(cAngle) * cDist;

        // Connection line
        ctx.beginPath();
        ctx.moveTo(qx, qy);
        ctx.lineTo(cdx, cdy);
        ctx.strokeStyle = colorAlpha(T.blue, 0.15 + chunk.score * 0.2);
        ctx.lineWidth = 1;
        ctx.setLineDash([3 * s, 3 * s]);
        ctx.stroke();
        ctx.setLineDash([]);

        // Chunk dot
        const dotSize = (2 + chunk.score * 2) * s;
        ctx.beginPath();
        ctx.arc(cdx, cdy, dotSize, 0, Math.PI * 2);
        ctx.fillStyle = chunk.score > 0.8 ? T.green : chunk.score > 0.6 ? T.blue : T.textMut;
        ctx.fill();

        // Score label
        if (!mobile) {
          ctx.font = `400 ${Math.max(6, 6 * s)}px 'IBM Plex Mono', monospace`;
          ctx.fillStyle = T.textSec;
          ctx.textAlign = 'left';
          ctx.fillText(`${chunk.score.toFixed(2)}`, cdx + 5 * s, cdy + 2 * s);
        }
      }
    }
  }

  /* ═══════════════════════════════════════════
     CHUNK CARDS
     ═══════════════════════════════════════════ */
  function drawChunkCards(x, y, w, chunks, visibleCount, highlightIdx, t, s) {
    const cardH = mobile ? 32 * s : 38 * s;
    const gap = 6 * s;
    const fs = Math.max(7, 8 * s);
    const fsSm = Math.max(6, 7 * s);

    for (let i = 0; i < visibleCount && i < chunks.length; i++) {
      const chunk = chunks[i];
      const cy = y + i * (cardH + gap);
      const isHighlighted = i <= highlightIdx;
      const color = chunk.score > 0.8 ? T.green : chunk.score > 0.6 ? T.blue : T.textMut;

      // Card bg
      ctx.fillStyle = isHighlighted ? colorAlpha(color, 0.06) : T.surface;
      ctx.beginPath(); ctx.roundRect(x, cy, w, cardH, 3 * s); ctx.fill();

      // Border
      ctx.strokeStyle = isHighlighted ? colorAlpha(color, 0.4) : T.border;
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.roundRect(x, cy, w, cardH, 3 * s); ctx.stroke();

      // Score bar
      const barW = 3 * s;
      ctx.fillStyle = color;
      ctx.fillRect(x, cy, barW, cardH);

      // Title
      ctx.font = `500 ${fs}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = isHighlighted ? T.text : T.textSec;
      ctx.textAlign = 'left';
      ctx.fillText(chunk.title, x + 10 * s, cy + 12 * s);

      // Score badge
      ctx.font = `400 ${fsSm}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = color;
      ctx.textAlign = 'right';
      ctx.fillText(`${(chunk.score * 100).toFixed(0)}%`, x + w - 6 * s, cy + 12 * s);

      // Snippet
      if (!mobile) {
        ctx.font = `400 ${fsSm}px 'IBM Plex Mono', monospace`;
        ctx.fillStyle = T.textMut;
        ctx.textAlign = 'left';
        const maxSnipW = w - 20 * s;
        let snip = chunk.snippet;
        while (ctx.measureText(snip).width > maxSnipW && snip.length > 0) snip = snip.slice(0, -1);
        if (snip.length < chunk.snippet.length) snip += '...';
        ctx.fillText(snip, x + 10 * s, cy + 26 * s);
      }
    }
  }

  /* ═══════════════════════════════════════════
     MAIN DRAW LOOP
     ═══════════════════════════════════════════ */
  let lastSpawnT = 0;

  function draw(ts) {
    if (!draw.start) draw.start = ts;
    const t = (ts - draw.start) / 1000;
    const s = S(W);
    ctx.clearRect(0, 0, W, H);

    // Grid
    ctx.strokeStyle = T.border; ctx.lineWidth = 0.5;
    ctx.globalAlpha = mobile ? 0.15 : 0.25;
    const gsp = 40 * s;
    for (let y = 0; y <= H; y += gsp) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    if (!mobile) {
      for (let x = 0; x <= W; x += gsp) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
    }
    ctx.globalAlpha = 1;

    // Current scenario
    const scenIdx = Math.floor(t / cycleDur) % SCENARIOS.length;
    const scen = SCENARIOS[scenIdx];
    const cycleT = (t % cycleDur) / cycleDur;

    // Phase calculations
    const queryProgress = Math.max(0, Math.min(1, cycleT / 0.12));
    const embedActive = cycleT >= 0.12 && cycleT < 0.18;
    const embedProgress = embedActive ? (cycleT - 0.12) / 0.06 : cycleT >= 0.18 ? 1 : 0;
    const retrieveActive = cycleT >= 0.18 && cycleT < 0.50;
    const retrieveProgress = retrieveActive ? (cycleT - 0.18) / 0.32 : cycleT >= 0.50 ? 1 : 0;
    const rankActive = cycleT >= 0.50 && cycleT < 0.58;
    const rankProgress = rankActive ? (cycleT - 0.50) / 0.08 : cycleT >= 0.58 ? 1 : 0;
    const genActive = cycleT >= 0.58 && cycleT < 0.85;
    const genProgress = genActive ? (cycleT - 0.58) / 0.27 : cycleT >= 0.85 ? 1 : 0;

    const padX = 20 * s;
    const padY = 34 * s;

    // ── Pipeline stages (top bar) ──
    const stageY = padY;
    const stageH = 28 * s;
    const stageW = mobile ? (W - padX * 2 - 12 * s) / 4 : (W - padX * 2 - 18 * s) / 4;
    const stageGap = mobile ? 4 * s : 6 * s;
    const stages = [
      { label: 'EMBED', color: T.cyan, active: embedActive, progress: embedProgress },
      { label: 'RETRIEVE', color: T.blue, active: retrieveActive, progress: retrieveProgress },
      { label: 'RANK', color: T.amber, active: rankActive, progress: rankProgress },
      { label: 'GENERATE', color: T.purple, active: genActive, progress: genProgress },
    ];

    for (let i = 0; i < stages.length; i++) {
      const sx = padX + i * (stageW + stageGap);
      const st = stages[i];
      const done = st.progress >= 1 && !st.active;
      drawStageBox(sx, stageY, stageW, stageH, st.label,
        done ? T.green : st.color, st.active, st.progress, t, s);

      // Arrow between stages
      if (i < stages.length - 1) {
        const arrowX = sx + stageW + stageGap / 2;
        ctx.fillStyle = T.borderLight;
        ctx.beginPath();
        ctx.moveTo(arrowX - 3 * s, stageY + stageH / 2 - 3 * s);
        ctx.lineTo(arrowX + 3 * s, stageY + stageH / 2);
        ctx.lineTo(arrowX - 3 * s, stageY + stageH / 2 + 3 * s);
        ctx.fill();
      }
    }

    // Spawn flow particles between active stages
    if (t - lastSpawnT > 0.08) {
      lastSpawnT = t;
      for (let i = 0; i < stages.length - 1; i++) {
        if (stages[i].active || stages[i + 1].active) {
          const sx1 = padX + i * (stageW + stageGap) + stageW;
          const sx2 = padX + (i + 1) * (stageW + stageGap);
          spawnFlowParticle(sx1, stageY + stageH / 2, sx2, stageY + stageH / 2,
            stages[i].active ? stages[i].color : stages[i + 1].color);
        }
      }
    }
    drawFlowParticles(t, s);

    // ── Query text ──
    const queryY = stageY + stageH + 20 * s;
    const queryFontSize = Math.max(8, 10 * s);
    ctx.font = `600 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.cyan;
    ctx.textAlign = 'left';
    ctx.fillText('QUERY', padX, queryY);

    ctx.font = `400 ${queryFontSize}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.text;
    const visChars = Math.floor(queryProgress * scen.query.length);
    const qText = scen.query.slice(0, visChars);
    ctx.fillText(qText, padX, queryY + 16 * s);

    // Cursor
    if (queryProgress < 1 && Math.sin(t * 8) > 0) {
      const cursorX = padX + ctx.measureText(qText).width + 2 * s;
      ctx.fillStyle = T.cyan;
      ctx.fillRect(cursorX, queryY + 6 * s, 1.5 * s, queryFontSize);
    }

    // ── Middle section: vector space + chunk cards ──
    const midY = queryY + 36 * s;
    const midH = H - midY - 80 * s;

    // Vector space (left side)
    const vecRadius = Math.min(midH / 2 - 10 * s, mobile ? 60 * s : 80 * s);
    const vecCX = padX + vecRadius + 10 * s;
    const vecCY = midY + midH / 2;

    if (cycleT >= 0.12) {
      drawVectorSpace(vecCX, vecCY, vecRadius,
        embedProgress > 0.5, scen.chunks,
        retrieveProgress, t, s);
    }

    // Chunk cards (right side)
    const cardsX = mobile ? vecCX + vecRadius + 15 * s : W / 2 + 10 * s;
    const cardsW = W - cardsX - padX;
    const visibleChunks = Math.floor(retrieveProgress * scen.chunks.length);
    const highlightIdx = rankActive ? Math.floor(rankProgress * scen.chunks.length) : cycleT >= 0.58 ? scen.chunks.length : -1;

    if (visibleChunks > 0) {
      ctx.font = `600 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.blue;
      ctx.textAlign = 'left';
      ctx.fillText('RETRIEVED CHUNKS', cardsX, midY + 4 * s);

      drawChunkCards(cardsX, midY + 14 * s, cardsW, scen.chunks, visibleChunks, highlightIdx, t, s);
    }

    // ── Generated answer (bottom) ──
    if (genProgress > 0) {
      const ansY = H - 70 * s;
      ctx.font = `600 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.purple;
      ctx.textAlign = 'left';
      ctx.fillText('GENERATED ANSWER', padX, ansY);

      const ansFs = Math.max(9, 11 * s);
      ctx.font = `400 ${ansFs}px 'IBM Plex Mono', monospace`;
      ctx.fillStyle = T.text;
      const ansChars = Math.floor(genProgress * scen.answer.length);
      const ansText = scen.answer.slice(0, ansChars);

      // Word wrap
      const maxW = W - padX * 2;
      const words = ansText.split(' ');
      let line = '';
      let ly = ansY + 16 * s;
      const lineH = ansFs * 1.5;
      for (const word of words) {
        const test = line ? line + ' ' + word : word;
        if (ctx.measureText(test).width > maxW && line) {
          ctx.fillText(line, padX, ly);
          line = word; ly += lineH;
        } else {
          line = test;
        }
      }
      if (line) ctx.fillText(line, padX, ly);

      // Cursor
      if (genProgress < 1 && Math.sin(t * 8) > 0) {
        const lastLineW = ctx.measureText(line).width;
        ctx.fillStyle = T.purple;
        ctx.fillRect(padX + lastLineW + 2 * s, ly - ansFs * 0.7, 1.5 * s, ansFs);
      }
    }

    // ── Fade out ──
    if (cycleT > 0.88) {
      const fadeOut = (cycleT - 0.88) / 0.12;
      ctx.fillStyle = colorAlpha(T.void, fadeOut);
      ctx.fillRect(0, 0, W, H);
    }

    // ── Status top-left ──
    ctx.font = `500 ${Math.max(8, 10 * s)}px 'IBM Plex Mono', monospace`;
    ctx.fillStyle = T.textMut; ctx.textAlign = 'left';
    ctx.fillText('RAG PIPELINE', 28 * s, 18 * s);
    ctx.beginPath(); ctx.arc(14 * s, 15 * s, Math.max(3, 4 * s), 0, Math.PI * 2);
    ctx.fillStyle = cycleT < 0.88 ? T.green : T.textMut; ctx.fill();

    // ── Phase indicator top-right ──
    ctx.font = `400 ${Math.max(7, 8 * s)}px 'IBM Plex Mono', monospace`;
    ctx.textAlign = 'right';
    let phaseLabel, phaseColor;
    if (cycleT < 0.12) { phaseLabel = 'QUERY INPUT'; phaseColor = T.cyan; }
    else if (cycleT < 0.18) { phaseLabel = 'EMBEDDING'; phaseColor = T.cyan; }
    else if (cycleT < 0.50) { phaseLabel = 'RETRIEVING'; phaseColor = T.blue; }
    else if (cycleT < 0.58) { phaseLabel = 'RANKING'; phaseColor = T.amber; }
    else if (cycleT < 0.85) { phaseLabel = 'GENERATING'; phaseColor = T.purple; }
    else { phaseLabel = 'COMPLETE'; phaseColor = T.green; }
    ctx.fillStyle = phaseColor;
    ctx.fillText(phaseLabel, W - 10 * s, 18 * s);

    requestAnimationFrame(draw);
  }
  requestAnimationFrame(draw);
})();
</script>
</body>
</html>
